<style>

  --bg:#f4f6fa; --panel:#ffffff; --panel2:#f8fafc; --border:#e2e8f0;
  --text:#0f172a; --muted:#64748b; --accent:#0284c7; --accent2:#0369a1;

[hidden]{display:none!important}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
h1{font-size:22px;margin:0 0 4px} h2{font-size:20px;margin:0}

.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);outline:none;max-width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}

.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px}

.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent2)}
.btn-sm{padding:4px 9px;font-size:12px;border-radius:6px}
.btn-danger{color:var(--red);border-color:var(--red)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.grid{display:grid;gap:12px}

.b-gray{background:var(--panel2);color:var(--muted);border:1px solid var(--border)}

<script>
/* ================================================================
   RSA FFM — 1 file HTML + Supabase (schema dùng chung với bản Next.js)
   Bảo mật thật nằm ở DB (RLS + trigger guard cột + activity_log).
   ================================================================ */
const SUPA_URL = "https://qcsfmdlagrfhtjryombm.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjc2ZtZGxhZ3JmaHRqcnlvbWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTIyOTMsImV4cCI6MjA5ODU2ODI5M30.UYSpJVyiQn7WIIzy9vZEpYzPV7Cs_PuPTo_1zoucOW4";
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ---------------- state ---------------- */
const S = {
  user: null, me: null,            // auth user + profile
  profiles: [], factories: [], templates: [], sellAccs: [], factAccs: [],
  orders: [], items: [],           // dữ liệu chính
  balances: [],                    // v_factory_balance
  rows: [],                        // item-per-row đã join (bảng đơn hàng)
  page: 1, perPage: 100,
  filters: { q:"", seller:"", factory:"", status:"", multi:false, special:"", dateFrom:"", dateTo:"", account:"", sort:"date", sortDir:"desc", batch:null },
  view: "dash",
  period: { mode:"all", from:"", to:"" },   /* bộ lọc thời gian dùng chung */
};
const maps = { profile:{}, factory:{}, template:{}, sellAcc:{}, order:{} };

const STATUS_VI = { new:"Mới", waiting_design:"Chờ design", design_ok:"Design xong",
  ordered:"Đã đẩy xưởng", in_production:"Đang SX", has_tracking:"Có tracking",
  synced:"Đã sync sàn", delivered:"Đã giao", issue:"Sự cố", cancelled:"Huỷ" };
const STATUS_BADGE = { new:"b-gray", waiting_design:"b-yellow", design_ok:"b-blue",
  ordered:"b-purple", in_production:"b-purple", has_tracking:"b-blue",
  synced:"b-blue", delivered:"b-green", issue:"b-red", cancelled:"b-gray" };
const ROLE_VI = { seller:"Seller", ffm:"FFM", admin:"Admin (SD)" };
const SCOPE_VI = { none:"Không", own:"Của mình", all:"Tất cả" };

/* ---------------- helpers ---------------- */
const $ = (s)=>document.querySelector(s);
const $$ = (s)=>[...document.querySelectorAll(s)];
const esc = (s)=> s==null ? "" : String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtD = (d)=>{ if(!d) return ""; const t = String(d).slice(0,10).split("-"); return t.length===3 ? `${t[2]}/${t[1]}/${t[0]}` : d; };
const fmtUSD = (n)=> n==null ? "" : "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney = (n,cur)=> n==null ? "" : (cur==="VND" ? Number(n).toLocaleString("vi-VN")+" ₫" : fmtUSD(n));
const today = ()=> new Date().toISOString().slice(0,10);
const isFFM = ()=> S.me && (S.me.role==="ffm" || S.me.role==="admin");
const isAdmin = ()=> S.me && S.me.role==="admin";

function toast(msg, err=false){
  const el = document.createElement("div");
  el.className = "toast"+(err?" err":""); el.textContent = msg;
  $("#toasts").appendChild(el); setTimeout(()=>el.remove(), err?6000:3500);
}
function fail(e){ console.error(e); toast((e && (e.message||e.error_description)) || "Có lỗi xảy ra", true); }

function openModal(html){ $("#modalBox").innerHTML = html; $("#modalBg").classList.add("show"); }
function closeModal(){ $("#modalBg").classList.remove("show"); $("#modalBox").innerHTML=""; }
$("#modalBg").addEventListener("click", e=>{ if(e.target.id==="modalBg") closeModal(); });

function csvDownload(filename, header, rows){
  const q = (v)=>{ v = v==null? "" : String(v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const csv = "﻿" + [header.map(q).join(","), ...rows.map(r=>r.map(q).join(","))].join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

/* Đọc bảng phân trang vượt limit 1000 của Supabase */
async function fetchAll(table, opts={}){
  const size = 1000; let from = 0; let out = [];
  for(;;){
    let q = db.from(table).select(opts.select || "*").range(from, from+size-1);
    if(opts.order) q = q.order(opts.order, {ascending: opts.asc ?? false});
    const { data, error } = await q;
    if(error) throw error;
    out = out.concat(data||[]);
    if(!data || data.length < size) break;
    from += size;
  }
  return out;
}
/* ================= AUTH + BOOT ================= */
$("#tabLogin").onclick = ()=>{ $("#tabLogin").classList.add("on"); $("#tabReg").classList.remove("on"); $("#formLogin").hidden=false; $("#formReg").hidden=true; };
$("#tabReg").onclick   = ()=>{ $("#tabReg").classList.add("on"); $("#tabLogin").classList.remove("on"); $("#formReg").hidden=false; $("#formLogin").hidden=true; };

$("#btnLogin").onclick = async ()=>{
  const email = $("#liEmail").value.trim(), password = $("#liPass").value;
  const eb = $("#liErr"); if(eb) eb.textContent = "";
  if(!email || !password){ if(eb) eb.textContent = "⚠ Nhập email và mật khẩu."; return; }
  const btn = $("#btnLogin"); btn.disabled = true; const _t = btn.textContent; btn.textContent = "Đang đăng nhập…";
  const { error } = await db.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = _t;
  if(error){
    let m = error.message || String(error);
    if(/invalid login credentials/i.test(m)) m = "Sai email hoặc mật khẩu.";

    if(eb) eb.textContent = "⚠ " + m; else fail(error);
    return;
  }
  location.reload();
};

/* Hiện lỗi RÕ RÀNG ngay trên màn đăng nhập, thay vì âm thầm đá ra (dễ soi lỗi) */
function bootError(msg){
  const el = $("#authScreen"); el.hidden = false;
  let box = document.getElementById("bootErr");
  if(!box){ box = document.createElement("div"); box.id = "bootErr";
    box.style.cssText = "max-width:380px;margin:12px auto 0;padding:10px 14px;border-radius:10px;background:var(--redbg);color:var(--red);font-size:12.5px;line-height:1.5;white-space:pre-wrap;text-align:left";
    (el.querySelector(".authcard")||el).insertAdjacentElement("afterend", box); }
  box.textContent = "⚠ " + msg;
}
async function boot(){
  let session = null;
  try{ session = (await db.auth.getSession()).data.session; }
  catch(e){ return bootError("Không kết nối được máy chủ: " + (e.message||e)); }
  if(!session){ $("#authScreen").hidden = false; return; }
  S.user = session.user;
  const { data: me, error } = await db.from("profiles").select("*").eq("id", S.user.id).maybeSingle();
  if(error){ return bootError("Không đọc được hồ sơ ("+(error.code||"?")+"): "+(error.message||error)
    + "\nNếu là 'infinite recursion' -> chạy lại supabase-setup.sql. Nếu 'column ... does not exist' -> DB thiếu cột, cũng chạy lại setup."); }
  if(!me){ return bootError("Tài khoản đăng nhập được nhưng CHƯA có hồ sơ trong bảng profiles. Chạy SQL tạo hồ sơ (xem HUONG-DAN mục 'tạo admin')."); }
  S.me = me;
  /* active/approved: chỉ chặn khi = false RÕ RÀNG. undefined (DB thiếu cột) -> KHÔNG khoá,
     tránh kẹt vĩnh viễn trên DB cũ thiếu cột 'approved'. */
  if(me.active === false){ $("#pendingScreen").hidden = false; return; }
  if(me.approved === false){ $("#pendingScreen").hidden = false; return; }
  $("#authScreen").hidden = true; $("#pendingScreen").hidden = true;
  const _be = document.getElementById("bootErr"); if(_be) _be.remove();
  $("#appShell").hidden = false;
  $("#userChip").textContent = me.full_name + " · " + (ROLE_VI[me.role]||me.role);
  try{ await loadAll(); }catch(e){ fail(e); }
  buildNav(); go(S.view);
  realtimeInit();
}

let _rtCh=null, _rtT=null, _rtPending=false;

async function rtRefresh(){ try{ await loadAll(); buildNav(); go(S.view); }catch(e){} }

async function loadAll(){
  const [profiles, factories, templates, sellAccs, factAccs, orders, items, balances, grants] = await Promise.all([
    fetchAll("profiles",{select:"*"}).catch(()=>[]),
    fetchAll("factories",{order:"name",asc:true}),
    fetchAll("templates",{order:"code",asc:true}),
    fetchAll("selling_accounts"),
    fetchAll("factory_accounts").catch(()=>[]),
    fetchAll("orders",{order:"order_date"}),
    fetchAll("order_items"),
    db.from("v_factory_balance").select("*").then(r=>{ if(r.error) throw r.error; return r.data; }).catch(()=>[]),
    db.from("care_grants").select("order_id").eq("grantee", S.user.id)
      .gt("expires_at", new Date().toISOString()).then(r=>r.data||[]).catch(()=>[]),
  ]);
  S.careGrants = new Set(grants.map(g=>g.order_id));
  S.profiles=profiles; S.factories=factories; S.templates=templates;
  S.sellAccs=sellAccs; S.factAccs=factAccs; S.orders=orders; S.items=items; S.balances=balances;
  maps.profile = Object.fromEntries(profiles.map(p=>[p.id,p]));
  maps.factory = Object.fromEntries(factories.map(f=>[f.id,f]));
  maps.template = Object.fromEntries(templates.map(t=>[t.id,t]));
  maps.sellAcc = Object.fromEntries(sellAccs.map(a=>[a.id,a]));
  maps.order = Object.fromEntries(orders.map(o=>[o.id,o]));
  buildRows();
}

/* item-per-row: mỗi sản phẩm 1 dòng (giữ bố cục Excel) */
function buildRows(){
  const byOrder = {};
  for(const it of S.items){ (byOrder[it.order_id] ||= []).push(it); }
  for(const k in byOrder) byOrder[k].sort((a,b)=>(a.source_line||0)-(b.source_line||0));
  S.rows = [];
  for(const o of S.orders){
    if(o.archived_at) continue;
    const its = byOrder[o.id] || [null];
    for(const it of its) S.rows.push({ o, it, multi: (byOrder[o.id]||[]).length>1 });
  }
  /* Phát hiện TRÙNG khách/địa chỉ giữa các ĐƠN KHÁC NHAU (góp ý 7.2) */
  const custMap = {};
  for(const o of S.orders){
    if(o.archived_at) continue;
    const key = ((o.customer_name||"")+"|"+(o.customer_address||"")).toLowerCase().replace(/\s+/g," ").trim();
    if(key.length > 10 && o.customer_name) (custMap[key] ||= []).push(o.id);
  }
  S.dupOrders = new Set(); S.dupGroups = [];
  for(const ids of Object.values(custMap)){
    if(ids.length > 1){ ids.forEach(id=>S.dupOrders.add(id)); S.dupGroups.push(ids); }
  }
}

function sellerName(o){
  return (o.seller_id && maps.profile[o.seller_id]?.full_name) || o.seller_name_import || "—";
}
/* Checklist 3 điều kiện đẩy xưởng (docx mục 5): Label + Confirm Design + Tracking */
function readyChecks(o, it){
  return { label: !!o.label_link, design: !!(it && (it.confirm_design || it.factory_design)), tracking: !!(o.tracking_number || (it && it.tracking_number)) };
}
function isReadyToPush(o, it){
  if(!it) return false;
  const c = readyChecks(o,it);
  return c.label && c.design && c.tracking && !it.factory_order_id
    && !["ordered","in_production","has_tracking","synced","delivered","cancelled"].includes(it.item_status);
}
/* SLA: đếm theo GIỜ tới hạn (deadline = 23:59 giờ US Eastern) — góp ý 7.1 */
function slaInfo(it){
  if(!it || !it.deadline_ship) return null;
  if(["delivered","synced","cancelled"].includes(it.item_status)) return null;
  const dl = new Date(it.deadline_ship+"T23:59:59-04:00");
  const ms = dl - new Date();
  const hrs = Math.floor(ms/36e5);
  const diff = Math.floor(ms/864e5);
  const cls = hrs < 24 ? "sla-red" : hrs <= 48 ? "sla-yellow" : "sla-green";
  const txt = ms < 0 ? `Trễ ${Math.max(1,-diff)} ngày` : hrs < 48 ? `Còn ${hrs}h` : `Còn ${diff} ngày`;
  return { diff, cls, txt, hrs };
}

/* ================= CẢNH BÁO tự sinh ================= */
function buildAlerts(){
  const A = [];
  for(const r of S.rows){
    const { o, it } = r; if(!it) continue;
    if(["delivered","synced","cancelled"].includes(it.item_status)) continue;
    const sla = slaInfo(it);
    if(sla && sla.diff < 0 && !["has_tracking"].includes(it.item_status))
      A.push({ lv:3, icon:"🔴", msg:`Đơn ${o.platform_order_id} (${sellerName(o)}) TRỄ deadline ship ${-sla.diff} ngày — ${STATUS_VI[it.item_status]}`, view:"orders", q:o.platform_order_id, side:"both", sid:o.seller_id, sname:sellerName(o) });
    else if(sla && sla.diff <= 1 && !["ordered","in_production","has_tracking"].includes(it.item_status))
      A.push({ lv:2, icon:"🟠", msg:`Đơn ${o.platform_order_id} (${sellerName(o)}) sắp tới deadline (${sla.txt}) mà chưa đẩy xưởng`, view:"orders", q:o.platform_order_id, side:"both", sid:o.seller_id, sname:sellerName(o) });
    const c = readyChecks(o,it);
    if(o.order_date && !["ordered","in_production","has_tracking"].includes(it.item_status)){
      const age = Math.floor((new Date() - new Date(o.order_date)) / 864e5);
      const miss = [!c.label&&"Label", !c.design&&"Confirm Design", !c.tracking&&"Tracking"].filter(Boolean);
      if(age >= 2 && miss.length)
        A.push({ lv:2, icon:"🟡", msg:`Đơn ${o.platform_order_id} (${sellerName(o)}) đã ${age} ngày còn thiếu: ${miss.join(", ")}`, view:"orders", q:o.platform_order_id, side:"seller", sid:o.seller_id, sname:sellerName(o) });
    }
    if(isReadyToPush(o,it))
      A.push({ lv:1, icon:"🟢", msg:`Đơn ${o.platform_order_id} đủ điều kiện — chờ FFM đẩy xưởng (${it.factory_id ? (maps.factory[it.factory_id]?.name||"?") : "chưa rõ xưởng"})`, view:"push", side:"ffm", sid:o.seller_id, sname:sellerName(o) });
  }
  /* trùng khách giữa các đơn đang chạy */
  let dupShown = 0;
  for(const ids of (S.dupGroups||[])){
    if(dupShown >= 15) break;
    const os = ids.map(id=>maps.order[id]).filter(Boolean);
    const activeIds = new Set(S.rows.filter(r=>r.it && !["delivered","synced","cancelled"].includes(r.it.item_status)).map(r=>r.o.id));
    if(!os.some(o=>activeIds.has(o.id))) continue;
    dupShown++;
    A.push({ lv:1, icon:"👥", msg:`Trùng khách "${os[0].customer_name||"?"}": ${os.length} đơn — kiểm tra gộp/tách đơn`, view:"orders", q:os[0].customer_name||"", side:"seller", sid:os[0].seller_id, sname:sellerName(os[0]) });
  }
  for(const b of S.balances){
    if(Number(b.balance_usd) < 0)
      A.push({ lv:3, icon:"💸", msg:`Xưởng ${b.name} ÂM số dư ${fmtUSD(b.balance_usd)} — cần topup`, view:"finance", side:"ffm", sid:null, sname:"" });
  }
  return A.sort((a,b)=>b.lv-a.lv);
}

function renderDash(){
  const rows = S.rows.filter(r=>r.it && inPeriod(r.o.order_date));
  const active = rows.filter(r=>!["delivered","synced","cancelled"].includes(r.it.item_status));
  const newToday = S.orders.filter(o=>o.order_date===today()).length;
  const waitSeller = active.filter(r=>{ const c=readyChecks(r.o,r.it); return !(c.label&&c.design&&c.tracking) && !["ordered","in_production","has_tracking"].includes(r.it.item_status); }).length;
  const waitFFM = rows.filter(r=>isReadyToPush(r.o,r.it)).length;
  const inProd = rows.filter(r=>["ordered","in_production"].includes(r.it.item_status)).length;
  const late = rows.filter(r=>{ const s=slaInfo(r.it); return s && s.diff<0; }).length;
  const issues = rows.filter(r=>r.it.item_status==="issue").length;
  const alerts = buildAlerts();

  /* biểu đồ đơn 14 ngày gần nhất */
  const _days=[], _dmap={};
  for(let i=13;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const k=d.toISOString().slice(0,10); _days.push(k); _dmap[k]=0; }
  for(const o of S.orders){ if(o.order_date && _dmap[o.order_date]!==undefined) _dmap[o.order_date]++; }
  const _mx=Math.max(1,..._days.map(k=>_dmap[k])), _cw=580, _ch=150, _pad=26, _bw=(_cw-2*_pad)/14;
  const _bars=_days.map((k,i)=>{ const v=_dmap[k], h=(_ch-46)*v/_mx, x=_pad+i*_bw, y=_ch-24-h;
    return `<rect x="${(x+2).toFixed(1)}" y="${y.toFixed(1)}" width="${(_bw-4).toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="var(--accent)"></rect>`
      +`<text x="${(x+_bw/2).toFixed(1)}" y="${_ch-8}" font-size="8" fill="var(--muted)" text-anchor="middle">${k.slice(8)}/${k.slice(5,7)}</text>`
      +(v?`<text x="${(x+_bw/2).toFixed(1)}" y="${(y-2).toFixed(1)}" font-size="9" fill="var(--text)" text-anchor="middle">${v}</text>`:""); }).join("");

  /* hàng chờ theo xưởng */
  const byF = {};
  for(const r of rows){
    if(!r.it.factory_id) continue;
    if(["delivered","synced","cancelled"].includes(r.it.item_status)) continue;
    const f = byF[r.it.factory_id] ||= { wait:0, prod:0, track:0 };
    if(isReadyToPush(r.o,r.it)) f.wait++;
    else if(["ordered","in_production"].includes(r.it.item_status)) f.prod++;

  $("#view").innerHTML = `

    <div class="flex"><button class="btn" onclick="exportOrdersCsv()">⇩ Xuất Excel</button>

    <div class="kpi" onclick="goFilter({special:'lack'})"><div class="n" style="color:var(--yellow)">${waitSeller}</div><div class="t">SP chờ Seller (thiếu điều kiện)</div></div>
    <div class="kpi" onclick="goFilter({special:'ready'})"><div class="n" style="color:var(--blue)">${waitFFM}</div><div class="t">Chờ FFM đẩy xưởng</div></div>
    <div class="kpi" onclick="goFilter({status:'in_production'})"><div class="n" style="color:var(--purple)">${inProd}</div><div class="t">Đang sản xuất</div></div>
    <div class="kpi" onclick="goFilter({special:'late'})"><div class="n" style="color:var(--red)">${late}</div><div class="t">Quá hạn SLA</div></div>
    <div class="kpi" onclick="goFilter({special:'issue'})"><div class="n" style="color:var(--red)">${issues}</div><div class="t">Sự cố</div></div>
  </div>
  <div class="card mb"><h3>📈 Đơn theo ngày (14 ngày gần nhất)</h3>
    <svg viewBox="0 0 ${_cw} ${_ch}" style="width:100%;height:auto;max-height:190px" preserveAspectRatio="xMidYMid meet">${_bars}</svg></div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(320px,1fr))">
    <div class="card"><h3>🏭 Hàng chờ theo xưởng</h3>
      <table><tr><th>Xưởng</th><th class="right">Chờ đẩy</th><th class="right">Đang SX</th><th class="right">Có tracking</th><th class="right">Số dư</th></tr>
      ${Object.entries(byF).sort((a,b)=>(b[1].wait+b[1].prod)-(a[1].wait+a[1].prod)).map(([fid,v])=>{
        const bal = S.balances.find(b=>b.factory_id===fid);
        const b = bal ? Number(bal.balance_usd) : null;
        return `<tr><td>${esc(maps.factory[fid]?.name||"?")}</td><td class="right">${v.wait||""}</td>
        <td class="right">${v.prod||""}</td><td class="right">${v.track||""}</td>
        <td class="right ${b!=null&&b<0?"sla-red":""}">${b!=null?fmtUSD(b):""}</td></tr>`;
      }).join("") || `<tr><td colspan="5" class="muted">Chưa có dữ liệu.</td></tr>`}</table>
      ${isFFM()?`<p class="small muted mt">Số dư = nạp − tiêu + hoàn · chi tiết ở mục Tài chính.</p>`:""}
    </div>

      ${alerts.length>8?`<button class="btn btn-sm" onclick="go('alerts')">Xem tất cả ${alerts.length} cảnh báo</button>`:""}
    </div>
  </div>`;
}

let todoSeller = "";
function renderTodo(){
  const isSellerRole = S.me.role==="seller";
  const mine = (r)=> !isSellerRole || r.o.seller_id===S.me.id;
  const rows = S.rows.filter(r=>r.it && mine(r));
  const lackAll = rows.filter(r=>{ const c=readyChecks(r.o,r.it);
    return !["ordered","in_production","has_tracking","synced","delivered","cancelled","issue"].includes(r.it.item_status) && !(c.label&&c.design&&c.tracking); });
  const todoSellers = isSellerRole?[]:[...new Set(lackAll.map(r=>sellerName(r.o)).filter(x=>x&&x!=="—"))].sort();
  if(todoSeller && !todoSellers.includes(todoSeller)) todoSeller="";
  const lack = (!isSellerRole && todoSeller)? lackAll.filter(r=>sellerName(r.o)===todoSeller) : lackAll;
  const ready = S.rows.filter(r=>isReadyToPush(r.o,r.it));
  const negBal = S.balances.filter(b=>Number(b.balance_usd)<0);
  const pend = S.profiles.filter(p=>!p.approved);
  let html = `<h1>Việc hôm nay</h1><p class="sub">Gom đúng việc cần làm theo vai trò của bạn</p>`;

  if(S.me.role==="seller" || isAdmin()){
    html += `<div class="card mb"><h3>🔵 ${isSellerRole?"VIỆC CỦA BẠN":"MỤC SELLER"} — đơn thiếu điều kiện (${lack.length})${(!isSellerRole&&todoSellers.length)?`<select onchange="todoSeller=this.value;renderTodo()" style="margin-left:8px;font-size:13px;font-weight:400"><option value="">Tất cả seller</option>${todoSellers.map(x=>`<option ${todoSeller===x?"selected":""}>${esc(x)}</option>`).join("")}</select>`:""}</h3>
    <div class="tw" style="max-height:340px"><table><tr><th>Order ID</th><th>Seller</th><th>Sản phẩm</th><th>Thiếu</th><th>SLA</th></tr>
    ${lack.slice(0,200).map(r=>{ const c=readyChecks(r.o,r.it); const sla=slaInfo(r.it);
      const miss=[!c.label&&"Label",!c.design&&"Design",!c.tracking&&"Tracking"].filter(Boolean).join(", ");
      return `<tr><td><a href="#" onclick="openOrder('${r.o.id}');return false">${esc(r.o.platform_order_id)}</a></td>
      <td>${esc(sellerName(r.o))}</td><td class="small">${esc(itemLabel(r.it))}</td>
      <td><span class="badge b-yellow">${miss}</span></td><td class="${sla?sla.cls:""}">${sla?sla.txt:""}</td></tr>`;
    }).join("") || `<tr><td colspan="5" class="muted">Không có ✨</td></tr>`}</table></div></div>`;
  }
  if(isFFM()){
    html += `<div class="card mb"><h3>🟢 MỤC FFM — chờ đẩy xưởng (${ready.length})</h3>
      ${ready.length?`<button class="btn btn-p btn-sm mb" onclick="go('push')">Mở màn hình Đẩy xưởng →</button>`:`<p class="muted">Không có đơn nào chờ.</p>`}
    </div>`;
    if(negBal.length) html += `<div class="card mb"><h3>💸 Xưởng cần topup</h3>
      ${negBal.map(b=>`<div class="alertrow"><span class="dot" style="background:var(--red)"></span>
      <span>${esc(b.name)}: <b class="sla-red">${fmtUSD(b.balance_usd)}</b></span></div>`).join("")}</div>`;
  }
  if(isAdmin() && pend.length){
    html += `<div class="card mb"><h3>👥 ${pend.length} tài khoản chờ duyệt</h3>
    <button class="btn btn-p btn-sm" onclick="go('users')">Duyệt ngay →</button></div>`;
  }
  $("#view").innerHTML = html;
}

let alertSide = "";
let alertSeller = "";
function renderAlerts(){
  let all = buildAlerts();
  const isSeller = S.me.role==="seller";
  if(isSeller) all = all.filter(a=>a.sid===S.me.id);   // seller chỉ thấy cảnh báo đơn của mình
  const sellers = [...new Set(all.map(a=>a.sname).filter(Boolean))].sort();
  if(alertSeller && !sellers.includes(alertSeller)) alertSeller="";
  const match  = (a,side)=> !side || a.side===side || a.side==="both";
  const matchS = a=> !alertSeller || a.sname===alertSeller;
  const alerts = all.filter(a=>match(a,alertSide) && matchS(a));
  const cnt = side=> all.filter(a=>match(a,side) && matchS(a)).length;
  const chip=(sd,l)=>`<button class="btn btn-sm ${alertSide===sd?"btn-p":""}" onclick="alertSide='${sd}';renderAlerts()">${l} <b>${cnt(sd)}</b></button>`;
  const sellerSel = (!isSeller && sellers.length)?`<select onchange="alertSeller=this.value;renderAlerts()" style="margin-left:8px;font-size:13px"><option value="">Tất cả seller</option>${sellers.map(x=>`<option ${alertSeller===x?"selected":""}>${esc(x)}</option>`).join("")}</select>`:"";
  /* KHÔNG nhúng dữ liệu (tên khách/Order ID) vào chuỗi onclick: trong ngữ cảnh thuộc tính,
     browser giải mã &#39; lại thành ' -> thoát chuỗi -> XSS. Dùng data-i + listener. */
  $("#view").innerHTML = `<h1>Cảnh báo</h1><p class="sub">Tự sinh từ dữ liệu · lọc theo bên phụ trách${isSeller?" · chỉ hiện đơn của bạn":" & theo từng seller"} · ưu tiên cao xuống thấp</p>
  <div class="flex mb" style="gap:6px;flex-wrap:wrap;align-items:center">${chip("","Tất cả")}${chip("seller","🔵 Seller")}${chip("ffm","🟢 FFM")}${sellerSel}</div>
  ${alerts.map((a,i)=>`<div class="alertrow"><span>${a.icon}</span><span>${esc(a.msg)}
    ${a.q?` — <a href="#" class="alk" data-i="${i}">xem đơn</a>`:
      a.view&&a.view!=="orders"?` — <a href="#" class="alk" data-i="${i}">mở</a>`:""}</span></div>`).join("")
    || `<div class="card">Không có cảnh báo nào 🎉</div>`}`;
  $$("#view .alk").forEach(el=> el.onclick = e=>{
    e.preventDefault();
    const a = alerts[+el.dataset.i]; if(!a) return;
    if(a.q){ S.filters.q = a.q; go("orders"); }
    else if(a.view){ go(a.view); }
  });
}

/* ================= ĐƠN HÀNG (bảng chính, bố cục Excel) ================= */
function itemLabel(it){
  if(!it) return "(chưa có SP)";
  const t = it.template_id && maps.template[it.template_id];
  return (t ? (t.code?t.code+" · ":"")+ (it.product_type||t.product_type||"") : (it.product_type || it.product_title || it.template_code || "")) || (it.product_title||"");
}
function filteredRows(){
  const f = S.filters, q = f.q.trim().toLowerCase();
  return S.rows.filter(r=>{
    const { o, it } = r;
    if(f.seller && sellerName(o)!==f.seller) return false;
    if(f.factory && (it?.factory_id||"")!==f.factory) return false;
    if(f.status && (it?.item_status||"")!==f.status) return false;
    if(f.multi && !r.multi) return false;
    if(f.account && (o.selling_account_id||"")!==f.account) return false;
    if(!inPeriod(o.order_date)) return false;
    if(f.special==="late"){ const _s=slaInfo(it); if(!(_s && _s.diff<0)) return false; }
    else if(f.special==="ready"){ if(!isReadyToPush(o,it)) return false; }
    else if(f.special==="lack"){ const _c=it?readyChecks(o,it):null;
      if(!(it && !["ordered","in_production","has_tracking","synced","delivered","cancelled","issue"].includes(it.item_status) && _c && !(_c.label&&_c.design&&_c.tracking))) return false; }
    else if(f.special==="issue"){ if(it?.item_status!=="issue") return false; }
    else if(f.special==="dup"){ if(!(S.dupOrders && S.dupOrders.has(o.id))) return false; }
    else if(f.special==="active"){ if(!it || ["delivered","synced","cancelled"].includes(it.item_status)) return false; }
    if(f.batch && f.batch.size){ const oid=(o.platform_order_id||"").toLowerCase();
      const hit = f.batch.has(oid) || f.batch.has((o.tracking_number||"").toLowerCase()) || f.batch.has((it?.tracking_number||"").toLowerCase()) || f.batch.has((it?.factory_order_id||"").toLowerCase());
      if(!hit) return false; }
    if(q){
      const hay = [o.platform_order_id, o.customer_name, o.customer_address, o.seller_note, o.buyer_note,
        o.tracking_number, it?.tracking_number, it?.color, it?.size, it?.factory_order_id, it?.product_title,
        it?.product_type, it?.template_code, sellerName(o)].map(x=>String(x||"").toLowerCase()).join(" | ");
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function goFilter(patch){
  S.filters = Object.assign({q:"",seller:"",factory:"",status:"",multi:false,special:"",dateFrom:"",dateTo:"",account:"",sort:"date",sortDir:"desc",batch:null}, patch||{});
  S.page = 1; go("orders");
}
function copyText(t){ if(!t) return;
  const done=()=>toast("Đã copy: "+String(t).slice(0,32));
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done).catch(()=>fbCopy(t,done)); } else fbCopy(t,done);
}
function fbCopy(t,cb){ try{ const a=document.createElement("textarea"); a.value=t; a.style.position="fixed"; a.style.opacity="0"; document.body.appendChild(a); a.select(); document.execCommand("copy"); a.remove(); cb&&cb(); }catch(e){} }
function sortRows(rows){
  const f=S.filters, dir=f.sortDir==="asc"?1:-1;
  const key=r=>{ if(f.sort==="sla"){ const x=slaInfo(r.it); return x?x.hrs:1e9; }
    if(f.sort==="cost"){ return r.it&&r.it.fulfillment_cost!=null?Number(r.it.fulfillment_cost):-1; }
    return r.o.order_date||""; };
  return rows.slice().sort((a,b)=>{ const ka=key(a),kb=key(b); return ka<kb?-dir:ka>kb?dir:0; });
}
/* ===== BỘ LỌC THỜI GIAN DÙNG CHUNG ===== */
function periodBounds(mode){
  mode = mode || S.period.mode;
  const d=new Date(), z=n=>String(n).padStart(2,"0"), iso=x=>`${x.getFullYear()}-${z(x.getMonth()+1)}-${z(x.getDate())}`;
  const t=iso(d);
  if(mode==="all") return {from:"",to:""};
  if(mode==="custom") return {from:S.period.from||"", to:S.period.to||""};
  if(mode==="day") return {from:t,to:t};
  if(mode==="week"){ const dow=(d.getDay()+6)%7, m=new Date(d); m.setDate(d.getDate()-dow); return {from:iso(m),to:t}; }
  if(mode==="month") return {from:iso(new Date(d.getFullYear(),d.getMonth(),1)), to:t};
  if(mode==="year") return {from:d.getFullYear()+"-01-01", to:t};
  return {from:"",to:""};
}
function inPeriod(ds){ const b=periodBounds(); if(!b.from&&!b.to) return true; if(!ds) return false;
  ds=String(ds).slice(0,10); if(b.from && ds<b.from) return false; if(b.to && ds>b.to) return false; return true; }
function periodBar(){
  const p=S.period, b=periodBounds();
  const btn=(m,l)=>`<button class="btn btn-sm ${p.mode===m?"btn-p":""}" onclick="setPeriod('${m}')">${l}</button>`;
  return `<div class="card mb"><div class="flex" style="gap:6px;flex-wrap:wrap;align-items:center">
    <span class="small muted">🗓️ Kỳ:</span>
    ${btn("all","Tất cả")}${btn("day","Hôm nay")}${btn("week","Tuần này")}${btn("month","Tháng này")}${btn("year","Năm nay")}
    <span class="small muted" style="margin-left:10px">Tùy chọn:</span>
    <input id="pFrom" type="date" value="${p.mode==="custom"?esc(p.from):(b.from||"")}" style="width:auto">
    <span class="small muted">→</span>
    <input id="pTo" type="date" value="${p.mode==="custom"?esc(p.to):(b.to||"")}" style="width:auto">
    ${p.mode!=="all"?`<span class="badge b-blue">${b.from||"…"} → ${b.to||"…"}</span>`:""}
  </div></div>`;
}
function setPeriod(m){ S.period.mode=m; S.page=1; go(S.view); }
function wirePeriod(){
  const f=$("#pFrom"), t=$("#pTo");
  if(f) f.onchange=e=>{ S.period.mode="custom"; S.period.from=e.target.value; S.page=1; go(S.view); };
  if(t) t.onchange=e=>{ S.period.mode="custom"; S.period.to=e.target.value; S.page=1; go(S.view); };
}

    <p class="sub">${rows.length} dòng SP · ${new Set(rows.map(r=>r.o.id)).size} đơn · <b>bấm vào dòng</b> để xem chi tiết · ✏️ Sửa nhanh để sửa tại chỗ · ⚙ Cột để ẩn/hiện</p></div>

function exportOrdersCsv(){
  const rows = filteredRows();
  csvDownload(`don-hang_${today()}.csv`,
    ["Ngày","Order ID","Platform","TK bán","Seller","Khách","SĐT","Địa chỉ","Sản phẩm","Product Type","Size","Color","SL","Design","Confirm","Xưởng","Order FFM","Tracking","Trạng thái","Deadline","Chi phí","Cur","Note"],
    rows.map(r=>{ const {o,it}=r; return [fmtD(o.order_date),o.platform_order_id,o.platform,
      o.selling_account_id&&maps.sellAcc[o.selling_account_id]?.name||"",sellerName(o),
      o.customer_name||"",o.customer_contact||"",o.customer_address||"",
      it?.product_title||itemLabel(it),it?.product_type||"",it?.size||"",it?.color||"",it?.quantity??"",
      it?.design_link||"",it?.confirm_design?"x":"",it?.factory_id&&maps.factory[it.factory_id]?.name||"",
      it?.factory_order_id||"",it?.tracking_number||o.tracking_number||"",it?STATUS_VI[it.item_status]:"",
      fmtD(it?.deadline_ship),it?.fulfillment_cost??"",it?.cost_currency||"",o.seller_note||""]; }));
  toast("Đã xuất "+rows.length+" dòng.");
}

function canEditOrder(o){
  if(isAdmin()) return true;
  if(S.careGrants && S.careGrants.has(o.id)) return true;   /* care hộ 24h */
  if(S.me.edit_scope==="all") return true;
  if(S.me.edit_scope==="own") return o.seller_id===S.me.id;
  return false;
}

function itemCard(o, it, i, ce, cf){
  const disS = ce?"":"disabled", disF = cf?"":"disabled";
  const c = readyChecks(o,it);
  return `<div class="card mb" id="it_${it.id}">
    <div class="spread"><h3>SP ${i+1} ${it.product_title?`<span class="muted small">· ${esc(it.product_title.slice(0,70))}</span>`:""}</h3>
      <div class="flex"><span class="badge ${STATUS_BADGE[it.item_status]}">${STATUS_VI[it.item_status]}</span>
      ${ce?`<button class="btn btn-sm btn-danger" onclick="delItem('${it.id}','${o.id}')">🗑</button>`:""}</div></div>
    ${(()=>{ const ready=c.label&&c.design&&c.tracking;
        const pushed=!!it.factory_order_id||["ordered","in_production","has_tracking","synced","delivered"].includes(it.item_status);
        const miss=[!c.label&&"Label",!c.design&&"Confirm Design",!c.tracking&&"Tracking"].filter(Boolean);

/* ================= NHẬP ĐƠN (sheet GIỮ ĐÚNG bố cục cột Excel) =================
   Theo góp ý seller: giữ thứ tự cột như sheet "Đơn đang đi"; Platform=TTS,

let NR = []; // rows đang nhập
function blankRow(){ return { order_id:"", date:today(), acc:"", label:"", cust:"", tmpl:"", ptype:"", fact:"", dim:"", sku:"", size:"", color:"", qty:1, listing:"", odesign:"", design:"", conf:"0", note:"", tracking:"" }; }
function rowHasData(r){ return !!(r.order_id||r.cust||r.tmpl||r.size||r.color||r.design||r.label||r.sku); }
function ensureBlank(){ while(NR.length<2 || rowHasData(NR[NR.length-1]) || rowHasData(NR[NR.length-2])){ const r=blankRow(); const prev=NR[NR.length-1]; if(prev){ r.date=prev.date; r.acc=prev.acc; r.accname=prev.accname; } NR.push(r); } }
function copyRowDown(i){ if(i<=0)return; const p=NR[i-1],r=NR[i]; if(!p)return; r.date=p.date;r.acc=p.acc;r.accname=p.accname;r.tmpl=p.tmpl;r.tmplname=p.tmplname;r.ptype=p.ptype;r.fact=p.fact;r.dim=p.dim; rerenderNewHost(); }
function _tDispG(t){ return (t.code?t.code+" · ":"")+t.name; }
function setFieldValue(i,k,v){
  if(k==="cust" && v && /\r?\n/.test(v)){ v = v.split(/\r?\n/).map(x=>x.trim()).filter(Boolean).join(" - "); }
  if(k==="date"){ NR[i].date = ttsDate(v)||v; return; }
  if(k==="accname"){ NR[i].accname=v; const a=S.sellAccs.find(x=>x.name===v); NR[i].acc=a?a.id:""; return; }
  if(k==="tmplname"){ NR[i].tmplname=v; const t=S.templates.find(x=>_tDispG(x)===v); if(t){NR[i].tmpl=t.id;NR[i].ptype=t.product_type||"";NR[i].fact=t.factory_id||"";NR[i].dim=t.dimension||"";} else NR[i].tmpl=""; return; }
  if(k==="qty"){ NR[i].qty=Number(v)||1; return; }
  if(k==="factname"||k==="ptype"||k==="dim"){ NR[i][k]=v; return; }
  NR[i][k]=v;
}
function fillDown(i,k){
  if(i<=0){ toast("Dòng đầu không có dòng trên để chép.",true); return; }
  const prev=NR[i-1];
  if(k==="accname"){ NR[i].acc=prev.acc; NR[i].accname=prev.accname; }
  else if(k==="tmplname"){ NR[i].tmpl=prev.tmpl; NR[i].tmplname=prev.tmplname; NR[i].ptype=prev.ptype; NR[i].fact=prev.fact; NR[i].dim=prev.dim; }
  else if(k==="date"){ NR[i].date=prev.date; }
  else if(k==="conf"){ NR[i].conf=prev.conf; }
  else { NR[i][k]=prev[k]; }
  rerenderNewHost();
  setTimeout(()=>{ const el=document.querySelector(`#view .sheet [data-i="${i}"][data-k="${k}"]`); if(el){ el.focus(); try{el.select&&el.select()}catch(_){} } },0);
}
function parseClipColumn(txt){
  const out=[]; let cur="", inQ=false;
  for(let i=0;i<txt.length;i++){ const c=txt[i];
    if(inQ){ if(c==='"'){ if(txt[i+1]==='"'){ cur+='"'; i++; } else inQ=false; } else cur+=c; }
    else { if(c==='"') inQ=true; else if(c==='\r'){} else if(c==='\n'){ out.push(cur); cur=""; } else cur+=c; }
  }
  out.push(cur);
  if(out.length>1 && out[out.length-1]==="") out.pop();
  return out;
}
function pasteColumn(ev, el){
  const cd = ev.clipboardData || window.clipboardData; if(!cd) return;
  const txt = cd.getData("text") || "";
  const html = cd.getData("text/html") || "";
  if(!txt) return;
  const k0=el.dataset.k, i00=+el.dataset.i;
  // Chỉ RẢI XUỐNG NHIỀU DÒNG khi nguồn đúng là bảng tính (Excel/Google Sheets) và có >1 hàng.
  // Copy từ web (TikTok/Cotik) hay 1 ô nhiều dòng -> luôn gộp vào 1 hàng.
  const isSheet = /google-sheets|data-sheets|urn:schemas-microsoft-com:office|excel\.sheet|mso-/i.test(html);
  let rows = null;
  if(isSheet && /<table/i.test(html)){
    const tr = html.match(/<tr[\s>]/gi);
    if(tr && tr.length>1) rows = parseClipColumn(txt);
  }
  if(!rows || rows.length<=1){   // 1 giá trị -> dán gọn trong 1 ô (setFieldValue tự nối xuống-dòng)
    ev.preventDefault();
    setFieldValue(i00,k0,txt.trim());
    rerenderNewHost();
    setTimeout(()=>{const e3=document.querySelector(`#view .sheet [data-i="${i00}"][data-k="${k0}"]`); if(e3)e3.focus();},0);
    return;
  }
  ev.preventDefault();   // nhiều hàng từ bảng tính -> rải xuống
  rows.forEach((v,off)=>{ const i=i00+off; while(NR.length<=i) NR.push(blankRow()); setFieldValue(i,k0,(v||"").trim()); });
  ensureBlank(); rerenderNewHost();
  setTimeout(()=>{ const e2=document.querySelector(`#view .sheet [data-i="${i00}"][data-k="${k0}"]`); if(e2) e2.focus(); },0);
  toast(`Đã dán ${rows.length} dòng vào cột.`);
}

  else if(k==="accname") v=(NR[i].accname!=null?NR[i].accname:(NR[i].acc&&maps.sellAcc[NR[i].acc]?maps.sellAcc[NR[i].acc].name:""))||"";
  else if(k==="tmplname") v=(NR[i].tmplname!=null?NR[i].tmplname:(NR[i].tmpl&&maps.template[NR[i].tmpl]?_tDispG(maps.template[NR[i].tmpl]):""))||"";

function custPreview(v){ if(!v||!v.trim())return ""; const c=splitCustomer(v); const a=[c.name?"👤"+c.name:"",c.phone?"📞"+c.phone:"",c.address?"📍"+c.address:""].filter(Boolean); return a.length?esc(a.join(" · ")):'<span class="sla-red">chưa tách được — sửa lại</span>'; }
/* Tách "Customer Info" gộp 1 ô (giống Excel) -> name / phone / address */
function splitCustomer(raw){
  const s = (raw||"").trim();
  if(!s) return { name:null, phone:null, address:null };
  const phoneRe = /(\(?\+?\d[\d\s().-]{6,}\d)/;
  const parts = s.split(/\r?\n|\s*\|\s*|\s[-–]\s/).map(x=>x.trim()).filter(Boolean);
  let name=null, phone=null; const addr=[];
  parts.forEach((p,i)=>{
    const pm = p.match(phoneRe);
    if(i===0 && !pm){ name = p; return; }
    if(pm && !phone){ phone = pm[1].trim(); const rest = p.replace(phoneRe,"").trim(); if(rest && !name && i===0) name = rest; else if(rest) addr.push(rest); return; }
    if(i===0){ name = p.replace(phoneRe,"").trim()||null; return; }
    addr.push(p);
  });
  return { name, phone, address: addr.length?addr.join(", "):null };
}

        const before=NR.length; ensureBlank(); if(NR.length!==before) rerenderNewHost(); return; }

        else { NR[i].tmpl=""; const before=NR.length; ensureBlank(); if(NR.length!==before) rerenderNewHost(); }

    };

function importTTS(){
  if(typeof XLSX==="undefined"){ toast("Chưa tải được thư viện đọc Excel, thử lại sau vài giây.",true); return; }
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".xlsx,.xls";
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
    rd.onload=ev=>{ try{
      const wb=XLSX.read(ev.target.result,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(aoa.length<3){ toast("File không có dữ liệu.",true); return; }
      const H=aoa[0].map(x=>String(x||"").trim().toLowerCase());
      const idx=n=>H.indexOf(n.toLowerCase());
      const ci={oid:idx("order id"),date:idx("created time"),qty:idx("quantity"),rec:idx("recipient"),ph:idx("phone #"),c:idx("country"),st:idx("state"),city:idx("city"),zip:idx("zipcode"),a1:idx("address line 1"),a2:idx("address line 2"),trk:idx("tracking id")};
      if(ci.oid<0){ toast("Không thấy cột 'Order ID' — đây có phải file To Ship của TTS không?",true); return; }
      const g=(row,i)=> (i>=0&&i<row.length)?String(row[i]==null?"":row[i]).trim():"";
      let added=0, seen=0;
      for(let r=2;r<aoa.length;r++){ const row=aoa[r]; const oid=g(row,ci.oid); if(!oid) continue; seen++;
        const addr=[g(row,ci.a1),g(row,ci.a2),g(row,ci.city),g(row,ci.st),g(row,ci.zip),g(row,ci.c)].filter(Boolean).join(", ");
        const cust=[g(row,ci.rec),g(row,ci.ph),addr].filter(Boolean).join(" - ");
        const nr=blankRow(); nr.order_id=oid; nr.date=ttsDate(g(row,ci.date))||nr.date; nr.qty=Number(g(row,ci.qty))||1; nr.cust=cust; nr.tracking=g(row,ci.trk);
        NR.push(nr); added++;
      }
      if(added){ ensureBlank(); rerenderNewHost(); toast(`Đã nạp ${added} dòng từ Excel TTS (Ngày·Order ID·Khách·SL·Tracking). Chọn Template rồi bấm 💾 Lưu.`); }
      else toast("Không có dòng đơn hợp lệ trong file.",true);
    }catch(err){ toast("Lỗi đọc Excel: "+(err.message||err),true); } };
    rd.readAsArrayBuffer(f); };
  inp.click();
}

async function saveNewRows(){
  const rows = NR.filter(r=>r.order_id.trim());
  if(!rows.length) return toast("Chưa có dòng nào có Order ID.", true);
  const groups = {};
  for(const r of rows) (groups[r.order_id.trim()] ||= []).push(r);
  let nOrders=0, nItems=0;
  try{
    for(const [oid, rs] of Object.entries(groups)){
      let order = S.orders.find(o=>o.platform==="TTS" && o.platform_order_id===oid);
      if(!order){
        const r0 = rs[0]; const cu = splitCustomer(r0.cust);
        const { data, error } = await db.from("orders").insert({
          platform:"TTS", platform_order_id:oid, shipped_by:"tiktok_shipping",
          seller_id: S.me.id,
          order_date: r0.date||null, selling_account_id: r0.acc||null,

          customer_name: cu.name, customer_contact: cu.phone, customer_address: cu.address,
          seller_note: r0.note||null, created_by: S.me.id,
        }).select().single();

        order = data; S.orders.push(order); maps.order[order.id]=order; nOrders++;
      }
      const existing = S.items.filter(i=>i.order_id===order.id).length;
      const payload = rs.map((r,j)=>({
        order_id: order.id, template_id: r.tmpl||null,
        product_type: r.ptype||null, factory_id: r.fact||null, dimension: r.dim||null,
        sku_phoi: r.sku||null, size: r.size||null, color: r.color||null, quantity: r.qty||1,
        listing_link: r.listing||null, order_design_code: r.odesign||null,
        design_link: r.design||null, confirm_design: r.conf==="1", needs_fix: r.conf==="2", factory_design: r.conf==="3", note: r.note||null,
        tracking_number: r.tracking||null,
        source_line: existing + j + 1,
        item_status: r.tracking ? "has_tracking" : ((r.conf==="1"||r.conf==="3") ? "design_ok" : (r.design ? "waiting_design" : "new")),
      }));

  buildRows(); NR = [blankRow(), blankRow()];

/* ================= IMPORT (Cotik .csv + RSA-FFM .xlsx) =================
   KHÔNG cần sửa file gốc. Đơn đã có -> chỉ cập nhật cấp đơn, giữ nguyên
   sản phẩm & dữ liệu FFM đã nhập. */
let IMP = null, IMP_WB = null;

/* ---- helpers parser dùng chung ---- */
const _cellStr = v => v==null ? "" : (v instanceof Date ? v.toISOString() : String(v).trim());
const _stripQ = v => { let s=_cellStr(v); if(s.startsWith("'")) s=s.slice(1).trim(); return s; };
const _cleanZero = v => { const s=_stripQ(v); return s==="0" ? "" : s; };
const _orN = s => s===""?null:s;
const _num = v => { if(typeof v==="number") return isFinite(v)?v:null;
  const t=_stripQ(v).replace(/[^0-9.\-]/g,""); if(t===""||t==="-"||t===".") return null;
  const n=Number(t); return isNaN(n)?null:n; };
const _pad2 = s => String(s).padStart(2,"0");
/* Nguồn ngày text là TikTok/US -> mặc định M/D/Y. Chỉ đảo sang D/M/Y khi vế đầu >12.
   Bỏ qua phần giờ ("5/31/2026 4:46 PM") vì regex neo ^ chỉ bắt phần ngày.
   Chặn tháng/ngày phi lý (vd 2026-31-05) để không đẩy chuỗi rác xuống Postgres. */
function _mdY(a,b,y){
  a=+a; b=+b; let mo,d;
  if(a>12 && b<=12){ d=a; mo=b; }        // rõ ràng D/M/Y
  else { mo=a; d=b; }                     // M/D/Y (US) — kể cả khi nhập nhằng
  return (mo>=1 && mo<=12 && d>=1 && d<=31) ? `${y}-${_pad2(mo)}-${_pad2(d)}` : null;
}
function _pDate(v){
  if(v==null || v==="") return null;
  if(v instanceof Date && !isNaN(v.getTime())) return `${v.getUTCFullYear()}-${_pad2(v.getUTCMonth()+1)}-${_pad2(v.getUTCDate())}`;
  if(typeof v==="number" && v>30000 && v<80000){ const d=new Date(Math.round((v-25569)*86400*1000));
    return isNaN(d.getTime())?null:`${d.getUTCFullYear()}-${_pad2(d.getUTCMonth()+1)}-${_pad2(d.getUTCDate())}`; }
  const t=_stripQ(v); if(!t||t==="0") return null;
  let m=t.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if(m){ const mo=+m[2], d=+m[3]; return (mo>=1&&mo<=12&&d>=1&&d<=31) ? `${m[1]}-${_pad2(mo)}-${_pad2(d)}` : null; }
  m=t.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/); if(m) return _mdY(m[1],m[2],m[3]);
  return null;
}
const _cleanSize = v => { const s=_cleanZero(v).replace(/\s+/g," ").trim(); return s||null; };
function _compactRaw(row){ const out={}; for(const k of Object.keys(row)){ const v=_cellStr(row[k]); if(v&&k) out[k]=v.length>500?v.slice(0,500):v; } return out; }
function _existing(orders){
  const set = new Set(S.orders.map(x=>x.platform+"|"+x.platform_order_id));
  return orders.filter(o=>set.has(o.platform+"|"+o.platform_order_id)).length;
}

function parseRsaSelected(){
  const names = $$(".impSh").filter(c=>c.checked).map(c=>c.value);
  if(!names.length) return toast("Chọn ít nhất 1 sheet.", true);
  const map=new Map(); const warnings=[]; let totalRows=0;
  for(const sn of names){
    const aoa = XLSX.utils.sheet_to_json(IMP_WB.Sheets[sn], { header:1, raw:true, defval:null });
    const res = parseRsaSheetJS(aoa, sn);
    warnings.push(...res.warnings); totalRows += res.stats.totalRows;
    for(const o of res.orders){ const k=o.platform+"|"+o.platform_order_id; if(!map.has(k)) map.set(k,o); }
  }
  const orders=[...map.values()];
  IMP = { source:"rsa_ffm", orders, warnings, existing:_existing(orders),
    stats:{ totalRows, orders:orders.length, items:orders.reduce((n,o)=>n+o.items.length,0),
      multiItemOrders:orders.filter(o=>o.items.length>1).length } };
  showImpPreview();
}

/* ---- parser RSA-FFM: dò header + map cột theo TÊN (chịu được sheet lệch cột) ---- */
function parseRsaSheetJS(aoa, sheetName){
  const norm = s => _cellStr(s).toLowerCase().replace(/[()]/g,"").replace(/[\s\n\r]/g,"");
  let hr = -1;
  for(let r=0; r<Math.min(10,aoa.length); r++){
    if((aoa[r]||[]).some(c=>norm(c).includes("orderid"))){ hr=r; break; }
  }
  if(hr<0) return { orders:[], warnings:[{row:sheetName||"?", message:"Không tìm thấy dòng header (cột Order ID)."}],
    stats:{ totalRows:0, orders:0, items:0, multiItemOrders:0 } };
  const headerRow = aoa[hr]||[];
  const H = Array.from({length:headerRow.length},(_,i)=>norm(headerRow[i]));
  const fi = p => H.findIndex(p);
  const C = {
    orderDate: fi(h=>h.startsWith("ngàyorder")||h.startsWith("ngayorder")),
    orderId: fi(h=>h.includes("orderid")), platform: fi(h=>h==="platform"),
    account: fi(h=>h.includes("tàikhoảnbán")||h.includes("taikhoanban")),
    shippedBy: fi(h=>h.includes("shippedby")), label: fi(h=>h.includes("linklabel")),
    labelFee: fi(h=>h.includes("labelfee")), sellerName: fi(h=>h.includes("sellername")),
    sellerNote: fi(h=>h.includes("sellernote")), customer: fi(h=>h.includes("customerinfo")),
    template: fi(h=>h==="template"), productType: fi(h=>h.includes("producttype")),
    factoryAuto: fi(h=>h.includes("nhàin")||h.includes("nhain")), dimension: fi(h=>h.includes("dimension")),
    phoi: fi(h=>h.startsWith("phôi")||h.startsWith("phoi")), size: fi(h=>h==="size"),
    color: fi(h=>h==="color"), quantity: fi(h=>h.includes("quantity")),
    linkSP: fi(h=>h.includes("linksảnphẩm")||h.includes("linksanpham")),

    carrier: fi(h=>h.includes("carrier")), pushedAt: fi(h=>h.includes("ngàyđẩy")||h.includes("ngayday")),

  };
  const header = Array.from({length:headerRow.length},(_,i)=>_cellStr(headerRow[i])||"");
  const get = (row,idx)=> idx>=0 ? row[idx] : undefined;
  /* Trả {name,phone,address}: ưu tiên ô gộp "Customer Info"; nếu sheet tách cột thì ghép lại. */
  const custOf = row=>{
    if(C.customer>=0) return splitCustomer(_cleanZero(get(row,C.customer)));

      const addr=[C.addr1,C.addr2,C.city,C.state,C.zip,C.country].filter(i=>i>=0)
        .map(i=>_cleanZero(get(row,i))).filter(Boolean).join(", ").trim();

    }

  };
  const rsaStatus = f=>{

    let track="none";
    if(/return|hoàn|hoan/.test(ts)) track="returned";
    else if(/deliver|đã giao|da giao/.test(ts)) track="delivered";
    else if(/transit|đang giao|dang giao|shipped/.test(ts)) track="in_transit";
    if(/cancel|hủy|huy|refund/.test((f.note+" "+ts).toLowerCase())) return {item:"cancelled",track};
    if(track==="delivered") return {item:"delivered",track};
    if(f.tracking) return {item:"has_tracking",track:track==="none"?"in_transit":track};
    if(f.pushedAt && f.carrier) return {item:"in_production",track};
    if(f.orderFFM) return {item:"ordered",track};
    if(f.confirm && f.label) return {item:"design_ok",track};
    if(f.design || f.confirm) return {item:"waiting_design",track};
    return {item:"new",track};
  };
  const map=new Map(); let dataRows=0; const warnings=[];
  for(let r=hr+1; r<aoa.length; r++){
    const row = aoa[r]||[];
    const id = _cleanZero(get(row,C.orderId)).replace(/\s+$/,"").trim();
    if(!id) continue;
    if(/grand\s*total|tổng/i.test(id)) continue;
    dataRows++;
    let plat = _cleanZero(get(row,C.platform)).toUpperCase();
    if(plat!=="TTS" && plat!=="AMZ") plat = /^\d{3}-\d{7}-\d{7}$/.test(id) ? "AMZ" : "TTS";
    const sbRaw = _cleanZero(get(row,C.shippedBy)).toLowerCase();
    let shipped = null;
    if(sbRaw.includes("tiktok")) shipped="tiktok_shipping";
    else if(sbRaw.includes("seller")) shipped="seller_shipping";
    else if(plat==="TTS") shipped="tiktok_shipping";
    const rawObj={}; header.forEach((h,i)=>{ if(h) rawObj[h]=row[i]; });
    let order = map.get(id);
    if(!order){
      const cust = custOf(row);
      order = { platform:plat, platform_order_id:id,
        selling_account_name:_orN(_cleanZero(get(row,C.account))),
        seller_name:_orN(_cleanZero(get(row,C.sellerName))) || _orN((sheetName||"").trim()),
        order_date:_pDate(get(row,C.orderDate)), shipped_by:shipped,
        label_link:_orN(_cleanZero(get(row,C.label))), label_fee:_num(get(row,C.labelFee)),
        tracking_number:_orN(_cleanZero(get(row,C.tracking))), platform_status:null, order_value:null,
        customer_name:cust.name, customer_contact:cust.phone, customer_address:cust.address,
        buyer_note:null, seller_note:_orN(_cleanZero(get(row,C.sellerNote))),
        source_raw:_compactRaw(rawObj), items:[] };
      map.set(id, order);
    } else {
      if(!order.customer_name){
        const cust = custOf(row);
        order.customer_name ??= cust.name; order.customer_contact ??= cust.phone; order.customer_address ??= cust.address;
      }
      order.label_link ??= _orN(_cleanZero(get(row,C.label)));
      order.tracking_number ??= _orN(_cleanZero(get(row,C.tracking)));
      order.order_date ??= _pDate(get(row,C.orderDate));
    }
    const confirm = _cleanZero(get(row,C.confirmDesign)) !== "";
    const tracking = _orN(_cleanZero(get(row,C.tracking)));
    const orderFFM = _orN(_cleanZero(get(row,C.orderFFM)));
    const pushedAt = _pDate(get(row,C.pushedAt));
    const carrier = _orN(_cleanZero(get(row,C.carrier)));
    const design = _orN(_cleanZero(get(row,C.fileDesign)));
    const noteText = _cleanZero(get(row,C.note));
    const st = rsaStatus({ trackingStatusText:_cleanZero(get(row,C.trackingStatus)),
      tracking, orderFFM, pushedAt, carrier, confirm, label:order.label_link, design, note:noteText });
    const factory = _orN(_cleanZero(get(row,C.xuong))) || _orN(_cleanZero(get(row,C.factoryAuto)));
    order.items.push({ source_line:order.items.length+1,
      product_title:_orN(_cleanZero(get(row,C.listing))) || _orN(_cleanZero(get(row,C.template))),
      template_code:_orN(_cleanZero(get(row,C.template))),
      product_type:_orN(_cleanZero(get(row,C.productType))),
      factory_name:factory, dimension:_orN(_cleanZero(get(row,C.dimension))),
      sku_phoi:_orN(_cleanZero(get(row,C.phoi))), skus_raw:_orN(_cleanZero(get(row,C.phoi))),
      size:_cleanSize(get(row,C.size)), color:_orN(_cleanZero(get(row,C.color))),
      quantity:_num(get(row,C.quantity))??1, design_link:design, confirm_design:confirm,
      listing_link:_orN(_cleanZero(get(row,C.linkSP))) || _orN(_cleanZero(get(row,C.listing))),
      order_design_code:_orN(_cleanZero(get(row,C.orderDesign))),
      factory_order_id:orderFFM, tracking_number:tracking, tracking_status:st.track, item_status:st.item,
      carrier, pushed_at:pushedAt, deadline_ship:_pDate(get(row,C.deadline)),
      fulfillment_cost:_num(get(row,C.itemsCost)), shipping_cost:_num(get(row,C.shippingCost)),
      note:_orN(noteText), source_raw:_compactRaw(rawObj) });
  }
  const orders=[...map.values()];
  return { orders, warnings, stats:{ totalRows:dataRows, orders:orders.length,
    items:orders.reduce((n,o)=>n+o.items.length,0), multiItemOrders:orders.filter(o=>o.items.length>1).length } };
}
function parseCotikJS(rowsRaw){
  const stripQ = v=>{ let s = v==null?"":String(v).trim(); if(s.startsWith("'")) s=s.slice(1).trim(); return s; };
  const orN = s=> s===""?null:s;
  const num = v=>{ const t=stripQ(v).replace(/[^0-9.\-]/g,""); if(t===""||t==="-"||t===".")return null; const n=Number(t); return isNaN(n)?null:n; };
  const pDate = v=> _pDate(stripQ(v));   /* dùng chung _pDate: US M/D/Y + chặn ngày phi lý */
  const SIZE_RE=/^(XXS|XS|S|M|L|XL|XXL|XXXL|[2-5]XL)$/i;
  const exSize = raw=>{ const parts=raw.split(",").map(p=>p.trim()).filter(Boolean);
    if(!parts.length) return {size:null,sku:null};
    const last=parts[parts.length-1];
    if(SIZE_RE.test(last)) return {size:last.toUpperCase(), sku:parts.slice(0,-1).join(", ")||null};
    if(parts.length===1&&SIZE_RE.test(parts[0])) return {size:parts[0].toUpperCase(),sku:null};
    return {size:null, sku:parts[0]||null}; };
  const sAcc = sn=>{ const v=stripQ(sn); if(!v) return null; const b=v.split(/\s-\s/)[0].trim();
    const m=b.match(/^([A-Za-z]+)\s*(\d+)$/); return m ? (m[1]+m[2]).toUpperCase() : b; };
  const sName = em=>{ const v=stripQ(em); if(!v) return null; const p=v.split(/\s-\s/);
    if(p.length<2) return null; return p[0].includes("@") ? (p.slice(1).join(" - ").trim()||null) : null; };
  const stOf = s=>{ s=(s||"").toUpperCase();
    if(s==="CANCELLED") return {item:"cancelled",track:"none"};
    if(s==="DELIVERED"||s==="COMPLETED") return {item:"delivered",track:"delivered"};
    if(s==="IN_TRANSIT") return {item:"has_tracking",track:"in_transit"};
    if(s==="AWAITING_COLLECTION") return {item:"has_tracking",track:"none"};
    if(s==="AWAITING_SHIPMENT") return {item:"ordered",track:"none"};
    return {item:"new",track:"none"}; };

  const warnings=[], map=new Map();
  rowsRaw.forEach((r0,idx)=>{
    const r={}; for(const k of Object.keys(r0)) r[k.replace(/^﻿/,"").trim()] = r0[k]==null?"":String(r0[k]);
    const id=stripQ(r["id"]); if(!id){ warnings.push({row:idx+2,message:"Thiếu Order ID — bỏ dòng."}); return; }
    const status=stripQ(r["status"]); const price=num(r["price"]);
    const orderValue = price!=null && price>0 && price<10000 ? price : null;
    let o=map.get(id);
    if(!o){
      o={ platform:"TTS", platform_order_id:id, selling_account_name:sAcc(r["shop_note"]),
        seller_name:sName(r["email_member"]), order_date:pDate(r["create_time"]),
        label_link:orN(stripQ(r["label"])), tracking_number:orN(stripQ(r["tracking_number"])),
        platform_status:orN(status), order_value:orderValue,
        customer_name:orN(stripQ(r["name"])), customer_contact:orN(stripQ(r["phone"])),
        customer_address:orN(stripQ(r["address"])), buyer_note:orN(stripQ(r["buyer_note"])), items:[] };
      map.set(id,o);
    } else {
      o.platform_status ??= orN(status); o.customer_name ??= orN(stripQ(r["name"]));
      o.customer_contact ??= orN(stripQ(r["phone"])); o.customer_address ??= orN(stripQ(r["address"]));
      o.label_link ??= orN(stripQ(r["label"])); o.tracking_number ??= orN(stripQ(r["tracking_number"]));
      o.order_value ??= orderValue;
      if(!o.selling_account_name) o.selling_account_name = sAcc(r["shop_note"]);
      if(!o.seller_name) o.seller_name = sName(r["email_member"]);
    }
    const {size,sku}=exSize(stripQ(r["skus"])); const st=stOf(status);
    o.items.push({ source_line:o.items.length+1, product_title:orN(stripQ(r["title"])),
      sku_phoi:sku, skus_raw:orN(stripQ(r["skus"])), size, quantity:num(r["quantity"])??1,
      listing_link:orN(stripQ(r["image"]))||orN(stripQ(r["main_images"])),
      order_design_code:orN(stripQ(r["seller_sku"])),
      tracking_number:orN(stripQ(r["tracking_number"])), tracking_status:st.track, item_status:st.item });
  });
  const orders=[...map.values()];
  const existSet=new Set(S.orders.map(x=>x.platform+"|"+x.platform_order_id));
  return { orders, warnings, existing: orders.filter(o=>existSet.has("TTS|"+o.platform_order_id)).length,
    stats:{ totalRows:rowsRaw.length, orders:orders.length,
      items:orders.reduce((n,o)=>n+o.items.length,0), multiItemOrders:orders.filter(o=>o.items.length>1).length } };
}
async function runImport(){
  if(!IMP) return;
  const btnHtml = $("#impPreview").innerHTML;
  $("#impPreview").innerHTML += `<p class="muted">Đang nạp, vui lòng đợi…</p>`;
  const src = IMP.source || "cotik";
  try{
    /* map TK bán: tạo thiếu (seller thường không có quyền -> bỏ qua, đơn vẫn nạp được) */
    const accByName = {}; S.sellAccs.forEach(a=>accByName[a.name]=a);
    const needAcc = [...new Set(IMP.orders.map(o=>o.selling_account_name).filter(n=>n && !accByName[n]))];
    if(needAcc.length){
      const byPlat = {};
      IMP.orders.forEach(o=>{ if(o.selling_account_name) byPlat[o.selling_account_name] ??= o.platform||"TTS"; });
      const { data, error } = await db.from("selling_accounts").insert(needAcc.map(n=>({platform:byPlat[n]||"TTS",name:n}))).select();
      if(!error && data) data.forEach(a=>{accByName[a.name]=a; S.sellAccs.push(a); maps.sellAcc[a.id]=a;});
      else if(error) toast(`Bỏ qua tạo ${needAcc.length} TK bán mới (cần quyền FFM/Admin)`, true);
    }
    /* map XƯỞNG theo tên (RSA): tạo thiếu nếu có quyền */
    const factByName = {}; S.factories.forEach(f=>factByName[f.name.toLowerCase()]=f);
    const needF = [...new Set(IMP.orders.flatMap(o=>o.items.map(i=>i.factory_name))
      .filter(n=>n && !factByName[n.toLowerCase()]))];
    if(needF.length){
      const { data, error } = await db.from("factories").insert(needF.map(n=>({name:n}))).select();
      if(!error && data) data.forEach(f=>{factByName[f.name.toLowerCase()]=f; S.factories.push(f); maps.factory[f.id]=f;});
      else if(error) toast(`Bỏ qua tạo ${needF.length} xưởng mới (cần quyền FFM/Admin): ${needF.join(", ").slice(0,60)}`, true);
    }
    /* map TEMPLATE theo code ('024_Onos_...' -> code '024') hoặc theo tên */
    const tmplByKey = {};
    S.templates.forEach(t=>{ if(t.code) tmplByKey[t.code]=t; tmplByKey[t.name.toLowerCase()] ??= t; });
    /* map seller theo seller_label / full_name */
    const profByLabel = {};
    S.profiles.forEach(p=>{ if(p.seller_label) profByLabel[p.seller_label.toLowerCase()]=p; profByLabel[p.full_name.toLowerCase()] ??= p; });
    const existByKey = {}; S.orders.forEach(o=>existByKey[o.platform+"|"+o.platform_order_id]=o);

    let created=0, updated=0, itemsAdded=0, skipped=0;
    const newOrders = [], newOrdersSrc = [];
    for(const po of IMP.orders){
      const plat = po.platform || "TTS";
      const ex = existByKey[plat+"|"+po.platform_order_id];
      if(ex){
        const patch = {};
        if(po.label_link && !ex.label_link) patch.label_link = po.label_link;
        if(po.tracking_number && ex.tracking_number!==po.tracking_number) patch.tracking_number = po.tracking_number;
        if(po.platform_status && ex.platform_status!==po.platform_status) patch.platform_status = po.platform_status;
        if(po.customer_name && !ex.customer_name){ patch.customer_name=po.customer_name; patch.customer_contact=po.customer_contact; patch.customer_address=po.customer_address; }
        if(po.order_value!=null && ex.order_value==null) patch.order_value = po.order_value;
        if(po.label_fee!=null && ex.label_fee==null) patch.label_fee = po.label_fee;
        if(po.seller_note && !ex.seller_note) patch.seller_note = po.seller_note;
        if(Object.keys(patch).length){
          /* đơn của seller khác -> RLS chặn UPDATE: bỏ qua, không vỡ cả lần import */
          const { error } = await db.from("orders").update(patch).eq("id", ex.id);
          if(!error){ Object.assign(ex, patch); updated++; } else skipped++;
        }
      } else {
        const prof = po.seller_name ? profByLabel[po.seller_name.toLowerCase()] : null;
        newOrders.push({ platform:plat, platform_order_id:po.platform_order_id,
          selling_account_id: po.selling_account_name ? (accByName[po.selling_account_name]?.id||null) : null,
          seller_id: prof?prof.id:null, seller_name_import: prof?null:po.seller_name,
          order_date:po.order_date, shipped_by:po.shipped_by||"tiktok_shipping", label_link:po.label_link,
          label_fee:po.label_fee??null, tracking_number:po.tracking_number,
          platform_status:po.platform_status, order_value:po.order_value,
          customer_name:po.customer_name, customer_contact:po.customer_contact, customer_address:po.customer_address,
          buyer_note:po.buyer_note, seller_note:po.seller_note||null,
          source_raw:po.source_raw||null, import_source:src, created_by:S.me.id });
        newOrdersSrc.push(po);
      }
    }
    for(let i=0; i<newOrders.length; i+=200){
      const chunk = newOrders.slice(i,i+200);
      const { data, error } = await db.from("orders").insert(chunk).select();
      if(error) throw error;
      created += data.length;
      const byPid = {}; data.forEach(o=>{ byPid[o.platform_order_id]=o; S.orders.push(o); maps.order[o.id]=o; });
      const itemRows = [];
      for(const po of newOrdersSrc.slice(i,i+200)){
        const o = byPid[po.platform_order_id]; if(!o) continue;
        for(const it of po.items){
          const { factory_name, ...rest } = it;
          let factory_id = null, template_id = null;
          if(factory_name){ const f = factByName[factory_name.toLowerCase()]; factory_id = f?f.id:null; }
          if(rest.template_code){
            const code = rest.template_code.split("_")[0].trim();
            const t = tmplByKey[code] || tmplByKey[rest.template_code.toLowerCase()];
            if(t){ template_id = t.id; factory_id ??= t.factory_id; rest.product_type ??= t.product_type; rest.dimension ??= t.dimension; }
          }
          itemRows.push({ order_id:o.id, ...rest, factory_id, template_id, import_source:src });
        }
      }
      for(let j=0; j<itemRows.length; j+=500){
        const { data:its, error:e2 } = await db.from("order_items").insert(itemRows.slice(j,j+500)).select();
        if(e2) throw e2; S.items.push(...its); itemsAdded += its.length;
      }
    }
    buildRows(); buildNav();
    toast(`Import xong: ${created} đơn mới (${itemsAdded} SP), ${updated} đơn cập nhật${skipped?`, ${skipped} đơn bỏ qua (ngoài quyền)`:""}.`);
    IMP=null; IMP_WB=null; go("orders");
  }catch(e){ $("#impPreview").innerHTML = btnHtml; fail(e); }
}

      const enc = "b64:"+btoa(unescape(encodeURIComponent(pw)));
      const { error:e2 } = await db.from("factory_secrets")
        .upsert({ factory_account_id: saved.id, password_enc: enc });
      if(e2) fail(e2);
    }
  }
  closeModal(); toast("Đã lưu.");
  const orderCol = t==="factory_accounts" ? "email" : "name";

  if(fresh){ if(t==="factories"){S.factories=fresh; maps.factory=Object.fromEntries(fresh.map(f=>[f.id,f]));}
    if(t==="templates"){S.templates=fresh; maps.template=Object.fromEntries(fresh.map(f=>[f.id,f]));}
    if(t==="selling_accounts"){S.sellAccs=fresh; maps.sellAcc=Object.fromEntries(fresh.map(f=>[f.id,f]));}
    if(t==="factory_accounts"){S.factAccs=fresh;} }
  renderCatalog();
}
async function mergeSellAcc(fromId){
  const toId = $("#cf_mergeto") ? $("#cf_mergeto").value : "";
  if(!toId){ toast("Chọn TK đích để gộp vào.",true); return; }
  const from = S.sellAccs.find(a=>a.id===fromId), to = S.sellAccs.find(a=>a.id===toId);
  const n = S.orders.filter(o=>o.selling_account_id===fromId).length;
  if(!confirm(`Gộp "${from?from.name:''}" → "${to?to.name:''}"?\n\n• ${n} đơn sẽ chuyển sang "${to?to.name:''}".\n• TK "${from?from.name:''}" bị xoá.\nKhông hoàn tác.`)) return;
  try{
    const { error:e1 } = await db.from("orders").update({ selling_account_id: toId }).eq("selling_account_id", fromId); if(e1) throw e1;
    const { error:e2 } = await db.from("selling_accounts").delete().eq("id", fromId); if(e2) throw e2;
    S.orders.forEach(o=>{ if(o.selling_account_id===fromId) o.selling_account_id=toId; });
    S.sellAccs = S.sellAccs.filter(a=>a.id!==fromId); delete maps.sellAcc[fromId];
    buildRows(); closeModal(); toast(`Đã gộp: chuyển ${n} đơn sang "${to?to.name:''}", xoá TK cũ.`); renderCatalog();
  }catch(e){ fail(e); }
}
async function catDel(id){
  if(!confirm("Xoá mục này? (Nếu đang được đơn hàng dùng sẽ không xoá được)")) return;
  const { error } = await db.from(catTab).delete().eq("id", id);
  if(error) return fail(error);
  closeModal(); toast("Đã xoá.");
  if(catTab==="factories") S.factories = S.factories.filter(x=>x.id!==id);
  if(catTab==="templates") S.templates = S.templates.filter(x=>x.id!==id);
  if(catTab==="selling_accounts") S.sellAccs = S.sellAccs.filter(x=>x.id!==id);
  if(catTab==="factory_accounts") S.factAccs = S.factAccs.filter(x=>x.id!==id);
  renderCatalog();
}

async function taskDel(id){

function readUserForm(id){
  const k = "u"+id.slice(0,8);
  const f = { role:$(`#${k}_role`).value, view_scope:$(`#${k}_v`).value, edit_scope:$(`#${k}_e`).value,
    delete_scope:$(`#${k}_d`).value, seller_label:$(`#${k}_label`).value||null };
  const nm = $(`#${k}_name`); if(nm && nm.value.trim()) f.full_name = nm.value.trim();
  return f;
}
async function approveUser(id){
  const f = readUserForm(id);
  const { error } = await db.from("profiles").update({ ...f, approved:true }).eq("id", id);
  if(error) return fail(error);
  let claimed = 0;
  if(f.seller_label){
    const { data, error:e2 } = await db.rpc("claim_seller_orders", { p_user:id, p_label:f.seller_label });
    if(e2) fail(e2); else claimed = data||0;
  }
  toast(`Đã duyệt.${claimed?` Gán ${claimed} đơn cũ của "${f.seller_label}".`:""}`);
  await reloadData();
}
async function saveUser(id){
  const f = readUserForm(id);
  const p = S.profiles.find(x=>x.id===id);
  const { error } = await db.from("profiles").update(f).eq("id", id);
  if(error) return fail(error);
  let claimed = 0;
  if(f.seller_label && f.seller_label!==p.seller_label){
    const { data } = await db.rpc("claim_seller_orders", { p_user:id, p_label:f.seller_label });
    claimed = data||0;
  }
  Object.assign(p, f);
  toast(`Đã lưu.${claimed?` Gán thêm ${claimed} đơn cũ.`:""}`);
}
async function delUser(id){
  const p = S.profiles.find(x=>x.id===id); if(!p) return;
  if(!confirm(`Xoá người dùng "${p.full_name}"?\n\n• Đơn của họ sẽ được GỠ GÁN (về "chưa gán") — KHÔNG mất đơn.\n• Muốn xoá hẳn tài khoản đăng nhập (email) thì vào Supabase → Authentication → Users.`)) return;
  await db.from("orders").update({ seller_id:null }).eq("seller_id", id);   // gỡ gán để tránh vướng khoá ngoại
  const { error } = await db.from("profiles").delete().eq("id", id);
  if(error){
    // Có lịch sử thao tác/nhật ký trỏ tới -> không xoá cứng được -> thu hồi toàn bộ quyền
    const { error:e2 } = await db.from("profiles").update({ active:false, approved:false }).eq("id", id);
    if(e2) return fail(e2);
    toast('User có lịch sử thao tác nên không xoá cứng — đã KHOÁ & thu hồi quyền. Xoá hẳn tài khoản trong Supabase → Authentication → Users.');
  } else {
    toast('Đã xoá người dùng. (Xoá hẳn tài khoản đăng nhập trong Supabase → Authentication → Users để giải phóng email.)');
  }
  await reloadData();
}
async function lockUser(id, active){
  const { error } = await db.from("profiles").update({ active }).eq("id", id);
  if(error) return fail(error);
  S.profiles.find(x=>x.id===id).active = active;
  toast(active?"Đã mở khoá.":"Đã khoá."); renderUsers();
}

async function renderLog(){

  <div id="lgBody"><p class="muted">Đang tải…</p></div></div>`;

const FLAB = { selling_account_id:"TK bán", seller_id:"Seller", factory_id:"Xưởng", template_id:"Template", item_status:"Trạng thái", confirm_design:"Confirm design", needs_fix:"Need Fix", factory_design:"Xưởng design", tracking_number:"Tracking", tracking_status:"TT tracking", factory_order_id:"Order FFM", fulfillment_cost:"Chi phí", cost_currency:"Tiền tệ", label_link:"Link Label", label_fee:"Phí Label", design_link:"Link design", customer_name:"Tên khách", customer_contact:"SĐT", customer_address:"Địa chỉ", size:"Size", color:"Color", quantity:"SL", sku_phoi:"SKU", listing_link:"Link SP", order_design_code:"Order Design", seller_note:"Note", order_date:"Ngày order", pushed_at:"Ngày đẩy", carrier:"Carrier", deadline_ship:"Deadline", name:"Tên", full_name:"Họ tên", role:"Vai trò", approved:"Duyệt", active:"Active", amount:"Số tiền", platform_order_id:"Order ID", product_type:"Product Type", dimension:"Dimension" };
function fLabel(k){ return FLAB[k]||k; }
function fVal(k,v){
  if(v==null||v==="") return "(trống)";
  if(k==="selling_account_id") return (maps.sellAcc[v]&&maps.sellAcc[v].name)||v;
  if(["seller_id","created_by","updated_by","actor","assignee_id","grantee"].includes(k)) return (maps.profile[v]&&maps.profile[v].full_name)||"(user)";
  if(k==="factory_id"||k==="factory_account_id") return (maps.factory[v]&&maps.factory[v].name)||v;
  if(k==="template_id"){ const t=maps.template[v]; return t?((t.code?t.code+" · ":"")+t.name):v; }
  if(k==="item_status") return STATUS_VI[v]||v;
  if(typeof v==="boolean") return v?"✓":"—";
  if(typeof v==="object") return JSON.stringify(v).slice(0,40);
  return String(v);
}
function logRefOf(l){
  if(l.entity==="orders"){ const o=maps.order[l.entity_id]; return o?("Đơn "+o.platform_order_id):(l.changes&&l.changes.platform_order_id?("Đơn "+l.changes.platform_order_id):""); }
  if(l.entity==="order_items"){ const it=S.items.find(x=>x.id===l.entity_id); const o=it&&maps.order[it.order_id]; return o?("Đơn "+o.platform_order_id):""; }
  if(l.entity==="profiles"){ return (maps.profile[l.entity_id]&&maps.profile[l.entity_id].full_name)||(l.changes&&l.changes.full_name)||""; }
  return (l.changes&&(l.changes.name||l.changes.platform_order_id))||"";
}
async function loadLog(){
  let q = db.from("activity_log").select("*").order("at",{ascending:false}).limit(300);
  const ent = $("#lgEntity") ? $("#lgEntity").value : "";
  if(ent) q = q.eq("entity", ent);
  const { data, error } = await q;
  const _lg = $("#lgBody"); if(!_lg) return;
  if(error){ _lg.innerHTML = `<p class="muted">Không đọc được nhật ký (cần quyền xem-toàn-bộ).</p>`; return; }
  const AV = { INSERT:'<span class="badge b-green">Thêm</span>', UPDATE:'<span class="badge b-yellow">Sửa</span>', DELETE:'<span class="badge b-red">Xoá</span>' };
  const SKIP = ["updated_at","updated_by","created_at","source_raw","id"];
  _lg.innerHTML = `<div class="tw" style="max-height:65vh"><table>
  <tr><th>Thời gian</th><th>Người làm</th><th>Hành động</th><th>Bảng</th><th>Đơn / Đối tượng</th><th>Thay đổi (cũ → mới)</th></tr>
  ${(data||[]).map(l=>{
    let detail = "";
    if(l.action==="UPDATE" && l.changes){
      detail = Object.entries(l.changes).filter(([k])=>!SKIP.includes(k)).slice(0,8)
        .map(([k,ov])=>`<b>${esc(fLabel(k))}</b>: <span class="muted">${esc(fVal(k, ov&&ov.old))}</span> → <b>${esc(fVal(k, ov&&ov.new))}</b>`).join("<br>");
    } else if(l.changes){
      detail = ["platform_order_id","name","full_name","item_status","amount","tracking_number"].filter(k=>l.changes[k]!=null)
        .map(k=>`${esc(fLabel(k))}: ${esc(fVal(k,l.changes[k]))}`).join("<br>") || "(cả dòng)";
    }
    return `<tr><td class="nowrap small">${new Date(l.at).toLocaleString("vi-VN")}</td>
    <td class="small nowrap">${esc(maps.profile[l.actor]?.full_name||"hệ thống")}</td><td>${AV[l.action]||l.action}</td>
    <td class="small">${l.entity}</td><td class="small nowrap">${esc(logRefOf(l))}</td><td class="small">${detail||""}</td></tr>`;
  }).join("") || `<tr><td colspan="6" class="muted">Chưa có hoạt động nào.</td></tr>`}</table></div>`;
}

function copyCotik(itemId){
  const it=S.items.find(x=>x.id===itemId); const o=it&&maps.order[it.order_id]; if(!o) return;
  copyText([o.customer_name,o.customer_contact,o.customer_address].filter(Boolean).join("\t"));
}
async function gridTmpl(itemId){
  const it=S.items.find(x=>x.id===itemId); if(!it) return;
  const el=$(`#g_template_id_${itemId}`); const tid=el?el.value:""; const t=maps.template[tid];
  const patch={ template_id: tid||null };
  if(t){ patch.product_type=t.product_type||null; patch.factory_id=t.factory_id||null; patch.dimension=t.dimension||null; }
  const { data, error } = await db.from("order_items").update(patch).eq("id",itemId).select().single();
  if(error) return fail(error);
  Object.assign(it, data||patch);
  const gx=$(`#gx_${itemId}`); if(gx) gx.textContent = it.factory_id&&maps.factory[it.factory_id]?.name||"";
  buildRows(); toast("Đã áp Template."); if(S.view==="orders"&&S.editMode) renderOrders();
}
function openCellEditor(itemId, field, label){
  const it=S.items.find(x=>x.id===itemId); if(!it) return; const o=maps.order[it.order_id]; if(!o) return;
  const orderLevel=["customer_name","customer_contact","customer_address","label_link"].includes(field);
  const ffmField=["tracking_number","factory_order_id","carrier"].includes(field);
  const cur = orderLevel ? (o[field]||"") : (it[field]||"");
  const canEdit = ffmField ? isFFM() : (canEditOrder(o) && S.me.role!=="ffm");
  openModal(`<div class="spread mb"><h2>${esc(label)} — đơn ${esc(o.platform_order_id)}</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>

  <div class="flex mt">${canEdit?`<button class="btn btn-p" onclick="saveCellEditor('${itemId}','${field}',${orderLevel})">💾 Lưu</button>`:`<span class="small muted">Chỉ xem</span>`}
    <button class="btn" onclick="copyText($('#cellEd').value)">📋 Copy</button>
    <button class="btn" onclick="closeModal()">Đóng</button></div>`);
}
async function saveCellEditor(itemId, field, orderLevel){
  const it=S.items.find(x=>x.id===itemId); if(!it) return; const o=maps.order[it.order_id];
  const v=($("#cellEd").value||"").trim()||null;
  if(orderLevel){ const {error}=await db.from("orders").update({[field]:v, updated_by:S.me.id}).eq("id",o.id); if(error) return fail(error); o[field]=v; }
  else { const {error}=await db.from("order_items").update({[field]:v}).eq("id",itemId); if(error) return fail(error); it[field]=v; }
  closeModal(); buildRows(); toast("Đã lưu."); if(S.view==="sheet") renderSheet();
}
async function gridSave(itemId){
  const it=S.items.find(x=>x.id===itemId); if(!it) return;
  const o=maps.order[it.order_id]; if(!o) return;
  const val=f=>{ const el=$(`#g_${f}_${itemId}`); return el?el.value:undefined; };
  const tr=v=>v==null?null:(String(v).trim()||null);
  const sOk=canEditOrder(o) && S.me.role!=="ffm", fOk=isFFM();
  try{
    if(sOk){
      const op={};
      const od=val("order_date"); if(od!==undefined) op.order_date=od||null;
      ["customer_name","customer_contact","customer_address","label_link"].forEach(f=>{ const v=val(f); if(v!==undefined) op[f]=tr(v); });
      if(Object.keys(op).length){ op.updated_by=S.me.id; const {error}=await db.from("orders").update(op).eq("id",o.id); if(error) throw error; Object.assign(o,op); }
    }
    const ip={};
    if(sOk){
      ["size","color","design_link","sku_phoi","listing_link","order_design_code"].forEach(f=>{ const v=val(f); if(v!==undefined) ip[f]=tr(v); });
      const qty=val("quantity"); if(qty!==undefined) ip.quantity=Number(qty)||1;
      const cf=val("confirm_design"); if(cf!==undefined){ ip.confirm_design=cf==="1"; ip.needs_fix=cf==="2"; ip.factory_design=cf==="3"; }
    }
    if(fOk){
      ["factory_order_id","carrier"].forEach(f=>{ const v=val(f); if(v!==undefined) ip[f]=tr(v); });
      const pa=val("pushed_at"); if(pa!==undefined) ip.pushed_at=pa||null;
      const cost=val("fulfillment_cost"); if(cost!==undefined) ip.fulfillment_cost=cost===""?null:Number(cost);
      const st=val("item_status"); if(st!==undefined) ip.item_status=st;
    }
    if(sOk||fOk){ const v=val("tracking_number"); if(v!==undefined) ip.tracking_number=tr(v); }
    if(Object.keys(ip).length){ const {data,error}=await db.from("order_items").update(ip).eq("id",itemId).select().single(); if(error) throw error; Object.assign(it,data||ip); }
    try{ document.querySelectorAll(`input[id$="_${itemId}"],select[id$="_${itemId}"]`).forEach(el=>{ el.classList.remove("okflash"); void el.offsetWidth; el.classList.add("okflash"); }); }catch(_){}
    buildRows(); buildNav(); toast("Đã lưu.");
  }catch(e){ fail(e); }
}
function toggleSel(id,on){ if(!S.sel) S.sel=new Set(); if(on) S.sel.add(id); else S.sel.delete(id); updateSelBar(); }
function selAll(on){ if(!S.sel) S.sel=new Set(); document.querySelectorAll(".rsel").forEach(cb=>{ cb.checked=on; const id=cb.dataset.id; if(on) S.sel.add(id); else S.sel.delete(id); }); updateSelBar(); }

function updateSelBar(){

  bar.innerHTML=`<b>Đã chọn ${n} SP</b>${(isFFM()||isAdmin())?`<select id="bulkStatus" style="color:#111;padding:3px"><option value="">— Đổi trạng thái —</option>${stO}</select>`:""}<select id="bulkFactory" style="color:#111;padding:3px"><option value="">— Đổi xưởng —</option>${fO}</select><button class="btn btn-p btn-sm" onclick="applyBulk()">Áp dụng</button><button class="btn btn-sm" onclick="clearSel()" style="background:#334155;color:#fff">Bỏ chọn</button>`;
}
async function applyBulk(){
  const st=$("#bulkStatus")?$("#bulkStatus").value:""; const fa=$("#bulkFactory")?$("#bulkFactory").value:"";
  if(!st && !fa) return toast("Chọn Trạng thái hoặc Xưởng để áp.",true);
  const ids=[...(S.sel||[])]; if(!ids.length) return;
  const patch={}; if(st) patch.item_status=st; if(fa) patch.factory_id=fa;
  try{ const {error}=await db.from("order_items").update(patch).in("id",ids); if(error) throw error;
    ids.forEach(id=>{ const it=S.items.find(x=>x.id===id); if(it) Object.assign(it,patch); });
    buildRows(); buildNav(); clearSel(); toast(`Đã cập nhật ${ids.length} SP.`); renderOrders();
  }catch(e){ fail(e); }
}

async function saveProfile(){

  if(!name) return toast("Nhập họ tên.", true);

<script>

if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
  if(self.caches &&

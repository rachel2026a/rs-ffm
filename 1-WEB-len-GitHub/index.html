<style>
:root{
  --bg:#f4f6fa; --panel:#ffffff; --panel2:#f8fafc; --border:#e2e8f0;
  --text:#0f172a; --muted:#64748b; --accent:#0284c7; --accent2:#0369a1;
  --green:#16a34a; --greenbg:#dcfce7; --yellow:#d97706; --yellowbg:#fef3c7;
  --red:#dc2626; --redbg:#fee2e2; --blue:#2563eb; --bluebg:#dbeafe;
  --purple:#7c3aed; --purplebg:#ede9fe;
  --auto:#dcfce7; --shadow:0 1px 3px rgba(15,23,42,.08);
  --sb:#111827; --sbtext:#d1d5db; --sbactive:#1f2937;
}
html.dark{
  --bg:#0b1220; --panel:#111a2e; --panel2:#0e1626; --border:#243146;
  --text:#e5edf8; --muted:#8ba0bd; --auto:#123822;
  --greenbg:#123822; --yellowbg:#3a2c08; --redbg:#3b1212; --bluebg:#12233f; --purplebg:#241540;
  --shadow:0 1px 3px rgba(0,0,0,.4);
  --sb:#0a0f1c; --sbtext:#9fb0c8; --sbactive:#182338;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
h1{font-size:22px;margin:0 0 4px} h2{font-size:20px;margin:0}
h3{font-size:15px;margin:0 0 10px}
.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);outline:none;max-width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label{font-size:12px;color:var(--muted);display:block;margin:8px 0 3px}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px}
.btn:hover{background:var(--panel2)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent2)}
.btn-sm{padding:4px 9px;font-size:12px;border-radius:6px}
.btn-danger{color:var(--red);border-color:var(--red)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.grid{display:grid;gap:12px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer}
.kpi .n{font-size:26px;font-weight:700}
.kpi .t{font-size:12px;color:var(--muted)}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--greenbg);color:var(--green)} .b-yellow{background:var(--yellowbg);color:var(--yellow)}
.b-red{background:var(--redbg);color:var(--red)} .b-blue{background:var(--bluebg);color:var(--blue)}
.b-gray{background:var(--panel2);color:var(--muted);border:1px solid var(--border)}
.b-purple{background:var(--purplebg);color:var(--purple)}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em;text-align:left;padding:8px;border-bottom:2px solid var(--border);white-space:nowrap;z-index:2}
td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:var(--panel2)}
.tw{overflow:auto;border:1px solid var(--border);border-radius:10px;background:var(--panel);max-height:calc(100vh - 260px)}
.thgroup th{background:var(--panel);color:var(--text);font-size:11px;border-bottom:1px solid var(--border);text-align:center;position:static}
.cell-auto{background:var(--auto)!important}
.nowrap{white-space:nowrap} .muted{color:var(--muted)} .small{font-size:11.5px}
.right{text-align:right} .center{text-align:center}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.mb{margin-bottom:14px}.mt{margin-top:14px}
.clip{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom}
/* ---------- layout ---------- */
#appShell{display:flex;min-height:100vh}
#sidebar{width:225px;background:var(--sb);color:var(--sbtext);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:margin .2s}

#main{flex:1;padding:20px 24px;min-width:0}

/* ---------- auth ---------- */
.authwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.authcard{width:380px;max-width:100%;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:26px;box-shadow:var(--shadow)}
.authcard .mark{width:46px;height:46px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin:0 auto 10px}
.tabs{display:flex;gap:6px;margin:14px 0}
.tabs button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-size:13px}
.tabs button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.authcard input{width:100%;margin-bottom:9px}
.authcard .btn-p{width:100%;padding:10px;margin-top:4px}
/* ---------- modal / toast ---------- */
#modalBg{position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;align-items:flex-start;justify-content:center;z-index:80;overflow:auto;padding:30px 12px}
#modalBg.show{display:flex}
#modalBox{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:760px;max-width:100%;padding:20px}
#toasts{position:fixed;bottom:16px;right:16px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--sb);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);max-width:340px}
.toast.err{background:var(--red)}
/* ---------- sheet nhập đơn ---------- */
.sheet td{padding:2px}
.sheet input,.sheet select{width:100%;border-radius:5px;padding:5px 6px;font-size:12px;border-color:transparent;background:transparent}
.sheet input:focus,.sheet select:focus{border-color:var(--accent);background:var(--panel)}
.sheet td.cell-auto input{background:var(--auto)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px}
.sla-red{color:var(--red);font-weight:700}.sla-yellow{color:var(--yellow);font-weight:600}.sla-green{color:var(--green)}
.alertrow{display:flex;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--panel);align-items:flex-start}
.dot{width:9px;height:9px;border-radius:99px;margin-top:5px;flex-shrink:0}
.checklist span{margin-right:8px;font-size:12px;white-space:nowrap}
</style>
</head>

<script>
/* ================================================================
   RSA FFM — 1 file HTML + Supabase (schema dùng chung với bản Next.js)
   Bảo mật thật nằm ở DB (RLS + trigger guard cột + activity_log).
   ================================================================ */
const SUPA_URL = "https://qcsfmdlagrfhtjryombm.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjc2ZtZGxhZ3JmaHRqcnlvbWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTIyOTMsImV4cCI6MjA5ODU2ODI5M30.UYSpJVyiQn7WIIzy9vZEpYzPV7Cs_PuPTo_1zoucOW4";
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ---------------- state ---------------- */
const S = {
  user: null, me: null,            // auth user + profile
  profiles: [], factories: [], templates: [], sellAccs: [], factAccs: [],
  orders: [], items: [],           // dữ liệu chính
  balances: [],                    // v_factory_balance
  rows: [],                        // item-per-row đã join (bảng đơn hàng)
  page: 1, perPage: 100,
  filters: { q:"", seller:"", factory:"", status:"", multi:false },
  view: "dash",
};
const maps = { profile:{}, factory:{}, template:{}, sellAcc:{}, order:{} };

const STATUS_VI = { new:"Mới", waiting_design:"Chờ design", design_ok:"Design xong",
  ordered:"Đã đẩy xưởng", in_production:"Đang SX", has_tracking:"Có tracking",
  synced:"Đã sync sàn", delivered:"Đã giao", issue:"Sự cố", cancelled:"Huỷ" };
const STATUS_BADGE = { new:"b-gray", waiting_design:"b-yellow", design_ok:"b-blue",
  ordered:"b-purple", in_production:"b-purple", has_tracking:"b-blue",
  synced:"b-blue", delivered:"b-green", issue:"b-red", cancelled:"b-gray" };
const ROLE_VI = { seller:"Seller", ffm:"FFM", admin:"Admin (SD)" };
const SCOPE_VI = { none:"Không", own:"Của mình", all:"Tất cả" };

/* ---------------- helpers ---------------- */
const $ = (s)=>document.querySelector(s);
const $$ = (s)=>[...document.querySelectorAll(s)];
const esc = (s)=> s==null ? "" : String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtD = (d)=>{ if(!d) return ""; const t = String(d).slice(0,10).split("-"); return t.length===3 ? `${t[2]}/${t[1]}/${t[0]}` : d; };
const fmtUSD = (n)=> n==null ? "" : "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney = (n,cur)=> n==null ? "" : (cur==="VND" ? Number(n).toLocaleString("vi-VN")+" ₫" : fmtUSD(n));
const today = ()=> new Date().toISOString().slice(0,10);
const isFFM = ()=> S.me && (S.me.role==="ffm" || S.me.role==="admin");
const isAdmin = ()=> S.me && S.me.role==="admin";

function toast(msg, err=false){
  const el = document.createElement("div");
  el.className = "toast"+(err?" err":""); el.textContent = msg;
  $("#toasts").appendChild(el); setTimeout(()=>el.remove(), err?6000:3500);
}
function fail(e){ console.error(e); toast((e && (e.message||e.error_description)) || "Có lỗi xảy ra", true); }

function openModal(html){ $("#modalBox").innerHTML = html; $("#modalBg").classList.add("show"); }
function closeModal(){ $("#modalBg").classList.remove("show"); $("#modalBox").innerHTML=""; }
$("#modalBg").addEventListener("click", e=>{ if(e.target.id==="modalBg") closeModal(); });

function csvDownload(filename, header, rows){
  const q = (v)=>{ v = v==null? "" : String(v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const csv = "﻿" + [header.map(q).join(","), ...rows.map(r=>r.map(q).join(","))].join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

/* Đọc bảng phân trang vượt limit 1000 của Supabase */
async function fetchAll(table, opts={}){
  const size = 1000; let from = 0; let out = [];
  for(;;){
    let q = db.from(table).select(opts.select || "*").range(from, from+size-1);
    if(opts.order) q = q.order(opts.order, {ascending: opts.asc ?? false});
    const { data, error } = await q;
    if(error) throw error;
    out = out.concat(data||[]);
    if(!data || data.length < size) break;
    from += size;
  }
  return out;
}
/* ================= AUTH + BOOT ================= */
$("#tabLogin").onclick = ()=>{ $("#tabLogin").classList.add("on"); $("#tabReg").classList.remove("on"); $("#formLogin").hidden=false; $("#formReg").hidden=true; };
$("#tabReg").onclick   = ()=>{ $("#tabReg").classList.add("on"); $("#tabLogin").classList.remove("on"); $("#formReg").hidden=false; $("#formLogin").hidden=true; };

$("#btnLogin").onclick = async ()=>{
  const email = $("#liEmail").value.trim(), password = $("#liPass").value;
  if(!email || !password) return toast("Nhập email và mật khẩu", true);
  const { error } = await db.auth.signInWithPassword({ email, password });
  if(error) return fail(error);
  location.reload();
};
$("#liPass").addEventListener("keydown", e=>{ if(e.key==="Enter") $("#btnLogin").click(); });

$("#btnReg").onclick = async ()=>{
  const full_name = $("#rgName").value.trim(), email = $("#rgEmail").value.trim(), password = $("#rgPass").value;
  if(!full_name || !email || password.length<6) return toast("Điền đủ họ tên, email, mật khẩu ≥6 ký tự", true);
  const { error } = await db.auth.signUp({ email, password, options:{ data:{ full_name } } });
  if(error) return fail(error);
  toast("Đăng ký thành công. Nếu Supabase bật xác nhận email, hãy kiểm tra hộp thư trước.");
  $("#tabLogin").click();
};

async function logout(){ await db.auth.signOut(); location.reload(); }
$("#btnLogout").onclick = logout;
$("#btnLogoutPending").onclick = logout;

/* dark mode */
if(localStorage.getItem("ffm_dark")==="1") document.documentElement.classList.add("dark");
$("#btnDark").onclick = ()=>{
  document.documentElement.classList.toggle("dark");
  localStorage.setItem("ffm_dark", document.documentElement.classList.contains("dark") ? "1":"0");
};
$("#burger").onclick = ()=> $("#sidebar").classList.toggle("open");

/* Hiện lỗi RÕ RÀNG ngay trên màn đăng nhập, thay vì âm thầm đá ra (dễ soi lỗi) */
function bootError(msg){
  const el = $("#authScreen"); el.hidden = false;
  let box = document.getElementById("bootErr");
  if(!box){ box = document.createElement("div"); box.id = "bootErr";
    box.style.cssText = "max-width:380px;margin:12px auto 0;padding:10px 14px;border-radius:10px;background:var(--redbg);color:var(--red);font-size:12.5px;line-height:1.5;white-space:pre-wrap;text-align:left";
    (el.querySelector(".authcard")||el).insertAdjacentElement("afterend", box); }
  box.textContent = "⚠ " + msg;
}
async function boot(){
  let session = null;
  try{ session = (await db.auth.getSession()).data.session; }
  catch(e){ return bootError("Không kết nối được máy chủ: " + (e.message||e)); }
  if(!session){ $("#authScreen").hidden = false; return; }
  S.user = session.user;
  const { data: me, error } = await db.from("profiles").select("*").eq("id", S.user.id).maybeSingle();
  if(error){ return bootError("Không đọc được hồ sơ ("+(error.code||"?")+"): "+(error.message||error)
    + "\nNếu là 'infinite recursion' -> chạy lại supabase-setup.sql. Nếu 'column ... does not exist' -> DB thiếu cột, cũng chạy lại setup."); }
  if(!me){ return bootError("Tài khoản đăng nhập được nhưng CHƯA có hồ sơ trong bảng profiles. Chạy SQL tạo hồ sơ (xem HUONG-DAN mục 'tạo admin')."); }
  S.me = me;
  /* active/approved: chỉ chặn khi = false RÕ RÀNG. undefined (DB thiếu cột) -> KHÔNG khoá,
     tránh kẹt vĩnh viễn trên DB cũ thiếu cột 'approved'. */
  if(me.active === false){ $("#pendingScreen").hidden = false; return; }
  if(me.approved === false){ $("#pendingScreen").hidden = false; return; }
  $("#appShell").hidden = false;
  $("#userChip").textContent = me.full_name + " · " + (ROLE_VI[me.role]||me.role);
  try{ await loadAll(); }catch(e){ fail(e); }
  buildNav(); go(S.view);
}

async function loadAll(){
  const [profiles, factories, templates, sellAccs, factAccs, orders, items, balances, grants] = await Promise.all([
    fetchAll("profiles",{select:"*"}).catch(()=>[]),
    fetchAll("factories",{order:"name",asc:true}),
    fetchAll("templates",{order:"code",asc:true}),
    fetchAll("selling_accounts"),
    fetchAll("factory_accounts").catch(()=>[]),
    fetchAll("orders",{order:"order_date"}),
    fetchAll("order_items"),
    db.from("v_factory_balance").select("*").then(r=>{ if(r.error) throw r.error; return r.data; }).catch(()=>[]),
    db.from("care_grants").select("order_id").eq("grantee", S.user.id)
      .gt("expires_at", new Date().toISOString()).then(r=>r.data||[]).catch(()=>[]),
  ]);
  S.careGrants = new Set(grants.map(g=>g.order_id));
  S.profiles=profiles; S.factories=factories; S.templates=templates;
  S.sellAccs=sellAccs; S.factAccs=factAccs; S.orders=orders; S.items=items; S.balances=balances;
  maps.profile = Object.fromEntries(profiles.map(p=>[p.id,p]));
  maps.factory = Object.fromEntries(factories.map(f=>[f.id,f]));
  maps.template = Object.fromEntries(templates.map(t=>[t.id,t]));
  maps.sellAcc = Object.fromEntries(sellAccs.map(a=>[a.id,a]));
  maps.order = Object.fromEntries(orders.map(o=>[o.id,o]));
  buildRows();
}

/* item-per-row: mỗi sản phẩm 1 dòng (giữ bố cục Excel) */
function buildRows(){
  const byOrder = {};
  for(const it of S.items){ (byOrder[it.order_id] ||= []).push(it); }
  for(const k in byOrder) byOrder[k].sort((a,b)=>(a.source_line||0)-(b.source_line||0));
  S.rows = [];
  for(const o of S.orders){
    if(o.archived_at) continue;
    const its = byOrder[o.id] || [null];
    for(const it of its) S.rows.push({ o, it, multi: (byOrder[o.id]||[]).length>1 });
  }
  /* Phát hiện TRÙNG khách/địa chỉ giữa các ĐƠN KHÁC NHAU (góp ý 7.2) */
  const custMap = {};
  for(const o of S.orders){
    if(o.archived_at) continue;
    const key = ((o.customer_name||"")+"|"+(o.customer_address||"")).toLowerCase().replace(/\s+/g," ").trim();
    if(key.length > 10 && o.customer_name) (custMap[key] ||= []).push(o.id);
  }
  S.dupOrders = new Set(); S.dupGroups = [];
  for(const ids of Object.values(custMap)){
    if(ids.length > 1){ ids.forEach(id=>S.dupOrders.add(id)); S.dupGroups.push(ids); }
  }
}

function sellerName(o){
  return (o.seller_id && maps.profile[o.seller_id]?.full_name) || o.seller_name_import || "—";
}
/* Checklist 3 điều kiện đẩy xưởng (docx mục 5): Label + Confirm Design + Tracking */
function readyChecks(o, it){
  return { label: !!o.label_link, design: !!(it && it.confirm_design), tracking: !!(o.tracking_number || (it && it.tracking_number)) };
}
function isReadyToPush(o, it){
  if(!it) return false;
  const c = readyChecks(o,it);
  return c.label && c.design && c.tracking && !it.factory_order_id
    && !["ordered","in_production","has_tracking","synced","delivered","cancelled"].includes(it.item_status);
}
/* SLA: đếm theo GIỜ tới hạn (deadline = 23:59 giờ US Eastern) — góp ý 7.1 */
function slaInfo(it){
  if(!it || !it.deadline_ship) return null;
  if(["delivered","synced","cancelled"].includes(it.item_status)) return null;
  const dl = new Date(it.deadline_ship+"T23:59:59-04:00");
  const ms = dl - new Date();
  const hrs = Math.floor(ms/36e5);
  const diff = Math.floor(ms/864e5);
  const cls = hrs < 24 ? "sla-red" : hrs <= 48 ? "sla-yellow" : "sla-green";
  const txt = ms < 0 ? `Trễ ${Math.max(1,-diff)} ngày` : hrs < 48 ? `Còn ${hrs}h` : `Còn ${diff} ngày`;
  return { diff, cls, txt, hrs };
}

/* ================= CẢNH BÁO tự sinh ================= */
function buildAlerts(){
  const A = [];
  for(const r of S.rows){
    const { o, it } = r; if(!it) continue;
    if(["delivered","synced","cancelled"].includes(it.item_status)) continue;
    const sla = slaInfo(it);
    if(sla && sla.diff < 0 && !["has_tracking"].includes(it.item_status))
      A.push({ lv:3, icon:"🔴", msg:`Đơn ${o.platform_order_id} (${sellerName(o)}) TRỄ deadline ship ${-sla.diff} ngày — ${STATUS_VI[it.item_status]}`, view:"orders", q:o.platform_order_id });
    else if(sla && sla.diff <= 1 && !["ordered","in_production","has_tracking"].includes(it.item_status))
      A.push({ lv:2, icon:"🟠", msg:`Đơn ${o.platform_order_id} (${sellerName(o)}) sắp tới deadline (${sla.txt}) mà chưa đẩy xưởng`, view:"orders", q:o.platform_order_id });
    const c = readyChecks(o,it);
    if(o.order_date && !["ordered","in_production","has_tracking"].includes(it.item_status)){
      const age = Math.floor((new Date() - new Date(o.order_date)) / 864e5);
      const miss = [!c.label&&"Label", !c.design&&"Confirm Design", !c.tracking&&"Tracking"].filter(Boolean);
      if(age >= 2 && miss.length)
        A.push({ lv:2, icon:"🟡", msg:`Đơn ${o.platform_order_id} (${sellerName(o)}) đã ${age} ngày còn thiếu: ${miss.join(", ")}`, view:"orders", q:o.platform_order_id });
    }
    if(isReadyToPush(o,it))
      A.push({ lv:1, icon:"🟢", msg:`Đơn ${o.platform_order_id} đủ điều kiện — chờ FFM đẩy xưởng (${it.factory_id ? (maps.factory[it.factory_id]?.name||"?") : "chưa rõ xưởng"})`, view:"push" });
  }
  /* trùng khách giữa các đơn đang chạy */
  let dupShown = 0;
  for(const ids of (S.dupGroups||[])){
    if(dupShown >= 15) break;
    const os = ids.map(id=>maps.order[id]).filter(Boolean);
    const activeIds = new Set(S.rows.filter(r=>r.it && !["delivered","synced","cancelled"].includes(r.it.item_status)).map(r=>r.o.id));
    if(!os.some(o=>activeIds.has(o.id))) continue;
    dupShown++;
    A.push({ lv:1, icon:"👥", msg:`Trùng khách "${os[0].customer_name||"?"}": ${os.length} đơn — kiểm tra gộp/tách đơn`, view:"orders", q:os[0].customer_name||"" });
  }
  for(const b of S.balances){
    if(Number(b.balance_usd) < 0)
      A.push({ lv:3, icon:"💸", msg:`Xưởng ${b.name} ÂM số dư ${fmtUSD(b.balance_usd)} — cần topup`, view:"finance" });
  }
  return A.sort((a,b)=>b.lv-a.lv);
}

function blankRow(){ return { order_id:"", date:today(), acc:"", label:"", cust:"", tmpl:"", ptype:"", fact:"", dim:"", sku:"", size:"", color:"", qty:1, listing:"", odesign:"", design:"", conf:"0", note:"" }; }

/* Tách "Customer Info" gộp 1 ô (giống Excel) -> name / phone / address */
function splitCustomer(raw){
  const s = (raw||"").trim();
  if(!s) return { name:null, phone:null, address:null };
  const phoneRe = /(\(?\+?\d[\d\s().-]{6,}\d)/;
  const parts = s.split(/\r?\n|\s*\|\s*|\s[-–]\s/).map(x=>x.trim()).filter(Boolean);
  let name=null, phone=null; const addr=[];
  parts.forEach((p,i)=>{
    const pm = p.match(phoneRe);
    if(i===0 && !pm){ name = p; return; }
    if(pm && !phone){ phone = pm[1].trim(); const rest = p.replace(phoneRe,"").trim(); if(rest && !name && i===0) name = rest; else if(rest) addr.push(rest); return; }
    if(i===0){ name = p.replace(phoneRe,"").trim()||null; return; }
    addr.push(p);
  });
  return { name, phone, address: addr.length?addr.join(", "):null };
}

  <p class="small muted mt">💡 Luôn sẵn 2 dòng trống cuối bảng — gõ gần hết tự sinh thêm, không cần bấm nút. Cùng 1 Order ID nhập nhiều dòng = đơn nhiều sản phẩm (tự gộp khi lưu). Order ID đã có trong hệ thống → sản phẩm được THÊM vào đơn cũ, không tạo trùng.</p>`;

  $$("#view .sheet select, #view .sheet input").forEach(el=>{
    const setVal = (i,k,v)=>{
      if(k==="factname") return;
      if(k==="tmpl"){
        NR[i].tmpl = v;
        const t = maps.template[v];
        if(t){ NR[i].ptype = t.product_type||""; NR[i].fact = t.factory_id||""; NR[i].dim = t.dimension||""; }
        renderNew(); return;
      }
      NR[i][k] = k==="qty" ? (Number(v)||1) : v;
      const before = NR.length; ensureBlank();
      if(NR.length !== before) renderNew();
    };
    if(el.tagName==="SELECT"){
      const i=+el.dataset.i, k=el.dataset.k;
      if(k==="acc") el.value=NR[i].acc;
      if(k==="tmpl") el.value=NR[i].tmpl;
      if(k==="conf") el.value=NR[i].conf;
      el.addEventListener("change", e=> setVal(+e.target.dataset.i, e.target.dataset.k, e.target.value));
    } else {
      el.addEventListener("input", e=> setVal(+e.target.dataset.i, e.target.dataset.k, e.target.value));
    }
  });
}
async function saveNewRows(){
  const rows = NR.filter(r=>r.order_id.trim());
  if(!rows.length) return toast("Chưa có dòng nào có Order ID.", true);
  const groups = {};
  for(const r of rows) (groups[r.order_id.trim()] ||= []).push(r);
  let nOrders=0, nItems=0;
  try{
    for(const [oid, rs] of Object.entries(groups)){
      let order = S.orders.find(o=>o.platform==="TTS" && o.platform_order_id===oid);
      if(!order){
        const r0 = rs[0]; const cu = splitCustomer(r0.cust);
        const { data, error } = await db.from("orders").insert({
          platform:"TTS", platform_order_id:oid, shipped_by:"tiktok_shipping",
          seller_id: S.me.id,
          order_date: r0.date||null, selling_account_id: r0.acc||null,
          label_link: r0.label||null,
          customer_name: cu.name, customer_contact: cu.phone, customer_address: cu.address,
          seller_note: r0.note||null, created_by: S.me.id,
        }).select().single();
        if(error) throw error;
        order = data; S.orders.push(order); maps.order[order.id]=order; nOrders++;
      }
      const existing = S.items.filter(i=>i.order_id===order.id).length;
      const payload = rs.map((r,j)=>({
        order_id: order.id, template_id: r.tmpl||null,
        product_type: r.ptype||null, factory_id: r.fact||null, dimension: r.dim||null,
        sku_phoi: r.sku||null, size: r.size||null, color: r.color||null, quantity: r.qty||1,
        listing_link: r.listing||null, order_design_code: r.odesign||null,
        design_link: r.design||null, confirm_design: r.conf==="1", note: r.note||null,
        source_line: existing + j + 1,
        item_status: r.conf==="1" ? "design_ok" : (r.design ? "waiting_design" : "new"),
      }));
      const { data: its, error: e2 } = await db.from("order_items").insert(payload).select();
      if(e2) throw e2;
      S.items.push(...its); nItems += its.length;
    }
  }catch(e){ return fail(e); }
  buildRows(); NR = [blankRow(), blankRow()];
  toast(`Đã lưu ${nOrders} đơn mới, ${nItems} sản phẩm.`); go("orders");
}

/* ================= IMPORT (Cotik .csv + RSA-FFM .xlsx) =================
   KHÔNG cần sửa file gốc. Đơn đã có -> chỉ cập nhật cấp đơn, giữ nguyên
   sản phẩm & dữ liệu FFM đã nhập. */
let IMP = null, IMP_WB = null;

/* ---- helpers parser dùng chung ---- */
const _cellStr = v => v==null ? "" : (v instanceof Date ? v.toISOString() : String(v).trim());
const _stripQ = v => { let s=_cellStr(v); if(s.startsWith("'")) s=s.slice(1).trim(); return s; };
const _cleanZero = v => { const s=_stripQ(v); return s==="0" ? "" : s; };
const _orN = s => s===""?null:s;
const _num = v => { if(typeof v==="number") return isFinite(v)?v:null;
  const t=_stripQ(v).replace(/[^0-9.\-]/g,""); if(t===""||t==="-"||t===".") return null;
  const n=Number(t); return isNaN(n)?null:n; };
const _pad2 = s => String(s).padStart(2,"0");
/* Nguồn ngày text là TikTok/US -> mặc định M/D/Y. Chỉ đảo sang D/M/Y khi vế đầu >12.
   Bỏ qua phần giờ ("5/31/2026 4:46 PM") vì regex neo ^ chỉ bắt phần ngày.
   Chặn tháng/ngày phi lý (vd 2026-31-05) để không đẩy chuỗi rác xuống Postgres. */
function _mdY(a,b,y){
  a=+a; b=+b; let mo,d;
  if(a>12 && b<=12){ d=a; mo=b; }        // rõ ràng D/M/Y
  else { mo=a; d=b; }                     // M/D/Y (US) — kể cả khi nhập nhằng
  return (mo>=1 && mo<=12 && d>=1 && d<=31) ? `${y}-${_pad2(mo)}-${_pad2(d)}` : null;
}
function _pDate(v){
  if(v==null || v==="") return null;
  if(v instanceof Date && !isNaN(v.getTime())) return `${v.getUTCFullYear()}-${_pad2(v.getUTCMonth()+1)}-${_pad2(v.getUTCDate())}`;
  if(typeof v==="number" && v>30000 && v<80000){ const d=new Date(Math.round((v-25569)*86400*1000));
    return isNaN(d.getTime())?null:`${d.getUTCFullYear()}-${_pad2(d.getUTCMonth()+1)}-${_pad2(d.getUTCDate())}`; }
  const t=_stripQ(v); if(!t||t==="0") return null;
  let m=t.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if(m){ const mo=+m[2], d=+m[3]; return (mo>=1&&mo<=12&&d>=1&&d<=31) ? `${m[1]}-${_pad2(mo)}-${_pad2(d)}` : null; }
  m=t.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/); if(m) return _mdY(m[1],m[2],m[3]);
  return null;
}
const _cleanSize = v => { const s=_cleanZero(v).replace(/\s+/g," ").trim(); return s||null; };
function _compactRaw(row){ const out={}; for(const k of Object.keys(row)){ const v=_cellStr(row[k]); if(v&&k) out[k]=v.length>500?v.slice(0,500):v; } return out; }
function _existing(orders){
  const set = new Set(S.orders.map(x=>x.platform+"|"+x.platform_order_id));
  return orders.filter(o=>set.has(o.platform+"|"+o.platform_order_id)).length;
}

function parseRsaSelected(){

/* ---- parser RSA-FFM: dò header + map cột theo TÊN (chịu được sheet lệch cột) ---- */
function parseRsaSheetJS(aoa, sheetName){
  const norm = s => _cellStr(s).toLowerCase().replace(/[()]/g,"").replace(/[\s\n\r]/g,"");
  let hr = -1;
  for(let r=0; r<Math.min(10,aoa.length); r++){
    if((aoa[r]||[]).some(c=>norm(c).includes("orderid"))){ hr=r; break; }
  }
  if(hr<0) return { orders:[], warnings:[{row:sheetName||"?", message:"Không tìm thấy dòng header (cột Order ID)."}],
    stats:{ totalRows:0, orders:0, items:0, multiItemOrders:0 } };
  const headerRow = aoa[hr]||[];
  const H = Array.from({length:headerRow.length},(_,i)=>norm(headerRow[i]));
  const fi = p => H.findIndex(p);
  const C = {
    orderDate: fi(h=>h.startsWith("ngàyorder")||h.startsWith("ngayorder")),
    orderId: fi(h=>h.includes("orderid")), platform: fi(h=>h==="platform"),
    account: fi(h=>h.includes("tàikhoảnbán")||h.includes("taikhoanban")),
    shippedBy: fi(h=>h.includes("shippedby")), label: fi(h=>h.includes("linklabel")),
    labelFee: fi(h=>h.includes("labelfee")), sellerName: fi(h=>h.includes("sellername")),
    sellerNote: fi(h=>h.includes("sellernote")), customer: fi(h=>h.includes("customerinfo")),
    template: fi(h=>h==="template"), productType: fi(h=>h.includes("producttype")),
    factoryAuto: fi(h=>h.includes("nhàin")||h.includes("nhain")), dimension: fi(h=>h.includes("dimension")),
    phoi: fi(h=>h.startsWith("phôi")||h.startsWith("phoi")), size: fi(h=>h==="size"),
    color: fi(h=>h==="color"), quantity: fi(h=>h.includes("quantity")),
    linkSP: fi(h=>h.includes("linksảnphẩm")||h.includes("linksanpham")),
    listing: fi(h=>h.includes("listingmockup")||h.includes("listingdesign")),
    orderDesign: fi(h=>h.includes("orderdesign")), fileDesign: fi(h=>h.includes("filedesign")),
    confirmDesign: fi(h=>h.includes("confirmdesign")), xuong: fi(h=>h==="xưởng"||h==="xuong"),
    carrier: fi(h=>h.includes("carrier")), pushedAt: fi(h=>h.includes("ngàyđẩy")||h.includes("ngayday")),
    orderFFM: fi(h=>h.includes("orderffm")), tracking: fi(h=>h.includes("trackingnumber")),
    deadline: fi(h=>h.includes("deadline")), trackingStatus: fi(h=>h.includes("trackingstatus")),
    shippingCost: fi(h=>h.includes("shippingcost")), itemsCost: fi(h=>h.includes("itemscost")),
    note: fi(h=>h==="note"),
    /* Layout tách cột khách (sheet kiểu "Nguyên"): Tên/Họ/SĐT/Địa chỉ riêng */
    firstName: fi(h=>h.includes("firstname")), lastName: fi(h=>h.includes("lastname")),
    phone: fi(h=>h==="phone"||h.includes("sốđiệnthoại")||h.includes("sodienthoai")),
    addr1: fi(h=>h.includes("addressline1")), addr2: fi(h=>h.includes("addressline2")),
    city: fi(h=>h==="city"), state: fi(h=>h==="state"), zip: fi(h=>h==="zip"), country: fi(h=>h==="country"),
  };
  const header = Array.from({length:headerRow.length},(_,i)=>_cellStr(headerRow[i])||"");
  const get = (row,idx)=> idx>=0 ? row[idx] : undefined;
  /* Trả {name,phone,address}: ưu tiên ô gộp "Customer Info"; nếu sheet tách cột thì ghép lại. */
  const custOf = row=>{
    if(C.customer>=0) return splitCustomer(_cleanZero(get(row,C.customer)));
    if(C.firstName>=0 || C.lastName>=0 || C.addr1>=0){
      const name=[_cleanZero(get(row,C.firstName)),_cleanZero(get(row,C.lastName))].filter(Boolean).join(" ").trim();
      const addr=[C.addr1,C.addr2,C.city,C.state,C.zip,C.country].filter(i=>i>=0)
        .map(i=>_cleanZero(get(row,i))).filter(Boolean).join(", ").trim();
      return { name:name||null, phone:_orN(_cleanZero(get(row,C.phone))), address:addr||null };
    }
    return { name:null, phone:null, address:null };
  };
  const rsaStatus = f=>{
    const ts = f.trackingStatusText.toLowerCase();
    let track="none";
    if(/return|hoàn|hoan/.test(ts)) track="returned";
    else if(/deliver|đã giao|da giao/.test(ts)) track="delivered";
    else if(/transit|đang giao|dang giao|shipped/.test(ts)) track="in_transit";
    if(/cancel|hủy|huy|refund/.test((f.note+" "+ts).toLowerCase())) return {item:"cancelled",track};
    if(track==="delivered") return {item:"delivered",track};
    if(f.tracking) return {item:"has_tracking",track:track==="none"?"in_transit":track};
    if(f.pushedAt && f.carrier) return {item:"in_production",track};
    if(f.orderFFM) return {item:"ordered",track};
    if(f.confirm && f.label) return {item:"design_ok",track};
    if(f.design || f.confirm) return {item:"waiting_design",track};
    return {item:"new",track};
  };
  const map=new Map(); let dataRows=0; const warnings=[];
  for(let r=hr+1; r<aoa.length; r++){
    const row = aoa[r]||[];
    const id = _cleanZero(get(row,C.orderId)).replace(/\s+$/,"").trim();
    if(!id) continue;
    if(/grand\s*total|tổng/i.test(id)) continue;
    dataRows++;
    let plat = _cleanZero(get(row,C.platform)).toUpperCase();
    if(plat!=="TTS" && plat!=="AMZ") plat = /^\d{3}-\d{7}-\d{7}$/.test(id) ? "AMZ" : "TTS";
    const sbRaw = _cleanZero(get(row,C.shippedBy)).toLowerCase();
    let shipped = null;
    if(sbRaw.includes("tiktok")) shipped="tiktok_shipping";
    else if(sbRaw.includes("seller")) shipped="seller_shipping";
    else if(plat==="TTS") shipped="tiktok_shipping";
    const rawObj={}; header.forEach((h,i)=>{ if(h) rawObj[h]=row[i]; });
    let order = map.get(id);
    if(!order){
      const cust = custOf(row);
      order = { platform:plat, platform_order_id:id,
        selling_account_name:_orN(_cleanZero(get(row,C.account))),
        seller_name:_orN(_cleanZero(get(row,C.sellerName))) || _orN((sheetName||"").trim()),
        order_date:_pDate(get(row,C.orderDate)), shipped_by:shipped,
        label_link:_orN(_cleanZero(get(row,C.label))), label_fee:_num(get(row,C.labelFee)),
        tracking_number:_orN(_cleanZero(get(row,C.tracking))), platform_status:null, order_value:null,
        customer_name:cust.name, customer_contact:cust.phone, customer_address:cust.address,
        buyer_note:null, seller_note:_orN(_cleanZero(get(row,C.sellerNote))),
        source_raw:_compactRaw(rawObj), items:[] };
      map.set(id, order);
    } else {
      if(!order.customer_name){
        const cust = custOf(row);
        order.customer_name ??= cust.name; order.customer_contact ??= cust.phone; order.customer_address ??= cust.address;
      }
      order.label_link ??= _orN(_cleanZero(get(row,C.label)));
      order.tracking_number ??= _orN(_cleanZero(get(row,C.tracking)));
      order.order_date ??= _pDate(get(row,C.orderDate));
    }
    const confirm = _cleanZero(get(row,C.confirmDesign)) !== "";
    const tracking = _orN(_cleanZero(get(row,C.tracking)));
    const orderFFM = _orN(_cleanZero(get(row,C.orderFFM)));
    const pushedAt = _pDate(get(row,C.pushedAt));
    const carrier = _orN(_cleanZero(get(row,C.carrier)));
    const design = _orN(_cleanZero(get(row,C.fileDesign)));
    const noteText = _cleanZero(get(row,C.note));
    const st = rsaStatus({ trackingStatusText:_cleanZero(get(row,C.trackingStatus)),
      tracking, orderFFM, pushedAt, carrier, confirm, label:order.label_link, design, note:noteText });
    const factory = _orN(_cleanZero(get(row,C.xuong))) || _orN(_cleanZero(get(row,C.factoryAuto)));
    order.items.push({ source_line:order.items.length+1,
      product_title:_orN(_cleanZero(get(row,C.listing))) || _orN(_cleanZero(get(row,C.template))),
      template_code:_orN(_cleanZero(get(row,C.template))),
      product_type:_orN(_cleanZero(get(row,C.productType))),
      factory_name:factory, dimension:_orN(_cleanZero(get(row,C.dimension))),
      sku_phoi:_orN(_cleanZero(get(row,C.phoi))), skus_raw:_orN(_cleanZero(get(row,C.phoi))),
      size:_cleanSize(get(row,C.size)), color:_orN(_cleanZero(get(row,C.color))),
      quantity:_num(get(row,C.quantity))??1, design_link:design, confirm_design:confirm,
      listing_link:_orN(_cleanZero(get(row,C.linkSP))) || _orN(_cleanZero(get(row,C.listing))),
      order_design_code:_orN(_cleanZero(get(row,C.orderDesign))),
      factory_order_id:orderFFM, tracking_number:tracking, tracking_status:st.track, item_status:st.item,
      carrier, pushed_at:pushedAt, deadline_ship:_pDate(get(row,C.deadline)),
      fulfillment_cost:_num(get(row,C.itemsCost)), shipping_cost:_num(get(row,C.shippingCost)),
      note:_orN(noteText), source_raw:_compactRaw(rawObj) });
  }
  const orders=[...map.values()];
  return { orders, warnings, stats:{ totalRows:dataRows, orders:orders.length,
    items:orders.reduce((n,o)=>n+o.items.length,0), multiItemOrders:orders.filter(o=>o.items.length>1).length } };
}
function parseCotikJS(rowsRaw){
  const stripQ = v=>{ let s = v==null?"":String(v).trim(); if(s.startsWith("'")) s=s.slice(1).trim(); return s; };
  const orN = s=> s===""?null:s;
  const num = v=>{ const t=stripQ(v).replace(/[^0-9.\-]/g,""); if(t===""||t==="-"||t===".")return null; const n=Number(t); return isNaN(n)?null:n; };
  const pDate = v=> _pDate(stripQ(v));   /* dùng chung _pDate: US M/D/Y + chặn ngày phi lý */
  const SIZE_RE=/^(XXS|XS|S|M|L|XL|XXL|XXXL|[2-5]XL)$/i;
  const exSize = raw=>{ const parts=raw.split(",").map(p=>p.trim()).filter(Boolean);
    if(!parts.length) return {size:null,sku:null};
    const last=parts[parts.length-1];
    if(SIZE_RE.test(last)) return {size:last.toUpperCase(), sku:parts.slice(0,-1).join(", ")||null};
    if(parts.length===1&&SIZE_RE.test(parts[0])) return {size:parts[0].toUpperCase(),sku:null};
    return {size:null, sku:parts[0]||null}; };
  const sAcc = sn=>{ const v=stripQ(sn); if(!v) return null; const b=v.split(/\s-\s/)[0].trim();
    const m=b.match(/^([A-Za-z]+)\s*(\d+)$/); return m ? (m[1]+m[2]).toUpperCase() : b; };
  const sName = em=>{ const v=stripQ(em); if(!v) return null; const p=v.split(/\s-\s/);
    if(p.length<2) return null; return p[0].includes("@") ? (p.slice(1).join(" - ").trim()||null) : null; };
  const stOf = s=>{ s=(s||"").toUpperCase();
    if(s==="CANCELLED") return {item:"cancelled",track:"none"};
    if(s==="DELIVERED"||s==="COMPLETED") return {item:"delivered",track:"delivered"};
    if(s==="IN_TRANSIT") return {item:"has_tracking",track:"in_transit"};
    if(s==="AWAITING_COLLECTION") return {item:"has_tracking",track:"none"};
    if(s==="AWAITING_SHIPMENT") return {item:"ordered",track:"none"};
    return {item:"new",track:"none"}; };

  const warnings=[], map=new Map();
  rowsRaw.forEach((r0,idx)=>{
    const r={}; for(const k of Object.keys(r0)) r[k.replace(/^﻿/,"").trim()] = r0[k]==null?"":String(r0[k]);
    const id=stripQ(r["id"]); if(!id){ warnings.push({row:idx+2,message:"Thiếu Order ID — bỏ dòng."}); return; }
    const status=stripQ(r["status"]); const price=num(r["price"]);
    const orderValue = price!=null && price>0 && price<10000 ? price : null;
    let o=map.get(id);
    if(!o){
      o={ platform:"TTS", platform_order_id:id, selling_account_name:sAcc(r["shop_note"]),
        seller_name:sName(r["email_member"]), order_date:pDate(r["create_time"]),
        label_link:orN(stripQ(r["label"])), tracking_number:orN(stripQ(r["tracking_number"])),
        platform_status:orN(status), order_value:orderValue,
        customer_name:orN(stripQ(r["name"])), customer_contact:orN(stripQ(r["phone"])),
        customer_address:orN(stripQ(r["address"])), buyer_note:orN(stripQ(r["buyer_note"])), items:[] };
      map.set(id,o);
    } else {
      o.platform_status ??= orN(status); o.customer_name ??= orN(stripQ(r["name"]));
      o.customer_contact ??= orN(stripQ(r["phone"])); o.customer_address ??= orN(stripQ(r["address"]));
      o.label_link ??= orN(stripQ(r["label"])); o.tracking_number ??= orN(stripQ(r["tracking_number"]));
      o.order_value ??= orderValue;
      if(!o.selling_account_name) o.selling_account_name = sAcc(r["shop_note"]);
      if(!o.seller_name) o.seller_name = sName(r["email_member"]);
    }
    const {size,sku}=exSize(stripQ(r["skus"])); const st=stOf(status);
    o.items.push({ source_line:o.items.length+1, product_title:orN(stripQ(r["title"])),
      sku_phoi:sku, skus_raw:orN(stripQ(r["skus"])), size, quantity:num(r["quantity"])??1,
      listing_link:orN(stripQ(r["image"]))||orN(stripQ(r["main_images"])),
      order_design_code:orN(stripQ(r["seller_sku"])),
      tracking_number:orN(stripQ(r["tracking_number"])), tracking_status:st.track, item_status:st.item });
  });
  const orders=[...map.values()];
  const existSet=new Set(S.orders.map(x=>x.platform+"|"+x.platform_order_id));
  return { orders, warnings, existing: orders.filter(o=>existSet.has("TTS|"+o.platform_order_id)).length,
    stats:{ totalRows:rowsRaw.length, orders:orders.length,
      items:orders.reduce((n,o)=>n+o.items.length,0), multiItemOrders:orders.filter(o=>o.items.length>1).length } };
}
async function runImport(){
  if(!IMP) return;
  const btnHtml = $("#impPreview").innerHTML;
  $("#impPreview").innerHTML += `<p class="muted">Đang nạp, vui lòng đợi…</p>`;
  const src = IMP.source || "cotik";
  try{
    /* map TK bán: tạo thiếu (seller thường không có quyền -> bỏ qua, đơn vẫn nạp được) */
    const accByName = {}; S.sellAccs.forEach(a=>accByName[a.name]=a);
    const needAcc = [...new Set(IMP.orders.map(o=>o.selling_account_name).filter(n=>n && !accByName[n]))];
    if(needAcc.length){
      const byPlat = {};
      IMP.orders.forEach(o=>{ if(o.selling_account_name) byPlat[o.selling_account_name] ??= o.platform||"TTS"; });
      const { data, error } = await db.from("selling_accounts").insert(needAcc.map(n=>({platform:byPlat[n]||"TTS",name:n}))).select();
      if(!error && data) data.forEach(a=>{accByName[a.name]=a; S.sellAccs.push(a); maps.sellAcc[a.id]=a;});
      else if(error) toast(`Bỏ qua tạo ${needAcc.length} TK bán mới (cần quyền FFM/Admin)`, true);
    }
    /* map XƯỞNG theo tên (RSA): tạo thiếu nếu có quyền */
    const factByName = {}; S.factories.forEach(f=>factByName[f.name.toLowerCase()]=f);
    const needF = [...new Set(IMP.orders.flatMap(o=>o.items.map(i=>i.factory_name))
      .filter(n=>n && !factByName[n.toLowerCase()]))];
    if(needF.length){
      const { data, error } = await db.from("factories").insert(needF.map(n=>({name:n}))).select();
      if(!error && data) data.forEach(f=>{factByName[f.name.toLowerCase()]=f; S.factories.push(f); maps.factory[f.id]=f;});
      else if(error) toast(`Bỏ qua tạo ${needF.length} xưởng mới (cần quyền FFM/Admin): ${needF.join(", ").slice(0,60)}`, true);
    }
    /* map TEMPLATE theo code ('024_Onos_...' -> code '024') hoặc theo tên */
    const tmplByKey = {};
    S.templates.forEach(t=>{ if(t.code) tmplByKey[t.code]=t; tmplByKey[t.name.toLowerCase()] ??= t; });
    /* map seller theo seller_label / full_name */
    const profByLabel = {};
    S.profiles.forEach(p=>{ if(p.seller_label) profByLabel[p.seller_label.toLowerCase()]=p; profByLabel[p.full_name.toLowerCase()] ??= p; });
    const existByKey = {}; S.orders.forEach(o=>existByKey[o.platform+"|"+o.platform_order_id]=o);

    let created=0, updated=0, itemsAdded=0, skipped=0;
    const newOrders = [], newOrdersSrc = [];
    for(const po of IMP.orders){
      const plat = po.platform || "TTS";
      const ex = existByKey[plat+"|"+po.platform_order_id];
      if(ex){
        const patch = {};
        if(po.label_link && !ex.label_link) patch.label_link = po.label_link;
        if(po.tracking_number && ex.tracking_number!==po.tracking_number) patch.tracking_number = po.tracking_number;
        if(po.platform_status && ex.platform_status!==po.platform_status) patch.platform_status = po.platform_status;
        if(po.customer_name && !ex.customer_name){ patch.customer_name=po.customer_name; patch.customer_contact=po.customer_contact; patch.customer_address=po.customer_address; }
        if(po.order_value!=null && ex.order_value==null) patch.order_value = po.order_value;
        if(po.label_fee!=null && ex.label_fee==null) patch.label_fee = po.label_fee;
        if(po.seller_note && !ex.seller_note) patch.seller_note = po.seller_note;
        if(Object.keys(patch).length){
          /* đơn của seller khác -> RLS chặn UPDATE: bỏ qua, không vỡ cả lần import */
          const { error } = await db.from("orders").update(patch).eq("id", ex.id);
          if(!error){ Object.assign(ex, patch); updated++; } else skipped++;
        }
      } else {
        const prof = po.seller_name ? profByLabel[po.seller_name.toLowerCase()] : null;
        newOrders.push({ platform:plat, platform_order_id:po.platform_order_id,
          selling_account_id: po.selling_account_name ? (accByName[po.selling_account_name]?.id||null) : null,
          seller_id: prof?prof.id:null, seller_name_import: prof?null:po.seller_name,
          order_date:po.order_date, shipped_by:po.shipped_by||"tiktok_shipping", label_link:po.label_link,
          label_fee:po.label_fee??null, tracking_number:po.tracking_number,
          platform_status:po.platform_status, order_value:po.order_value,
          customer_name:po.customer_name, customer_contact:po.customer_contact, customer_address:po.customer_address,
          buyer_note:po.buyer_note, seller_note:po.seller_note||null,
          source_raw:po.source_raw||null, import_source:src, created_by:S.me.id });
        newOrdersSrc.push(po);
      }
    }
    for(let i=0; i<newOrders.length; i+=200){
      const chunk = newOrders.slice(i,i+200);
      const { data, error } = await db.from("orders").insert(chunk).select();
      if(error) throw error;
      created += data.length;
      const byPid = {}; data.forEach(o=>{ byPid[o.platform_order_id]=o; S.orders.push(o); maps.order[o.id]=o; });
      const itemRows = [];
      for(const po of newOrdersSrc.slice(i,i+200)){
        const o = byPid[po.platform_order_id]; if(!o) continue;
        for(const it of po.items){
          const { factory_name, ...rest } = it;
          let factory_id = null, template_id = null;
          if(factory_name){ const f = factByName[factory_name.toLowerCase()]; factory_id = f?f.id:null; }
          if(rest.template_code){
            const code = rest.template_code.split("_")[0].trim();
            const t = tmplByKey[code] || tmplByKey[rest.template_code.toLowerCase()];
            if(t){ template_id = t.id; factory_id ??= t.factory_id; rest.product_type ??= t.product_type; rest.dimension ??= t.dimension; }
          }
          itemRows.push({ order_id:o.id, ...rest, factory_id, template_id, import_source:src });
        }
      }
      for(let j=0; j<itemRows.length; j+=500){
        const { data:its, error:e2 } = await db.from("order_items").insert(itemRows.slice(j,j+500)).select();
        if(e2) throw e2; S.items.push(...its); itemsAdded += its.length;
      }
    }
    buildRows(); buildNav();
    toast(`Import xong: ${created} đơn mới (${itemsAdded} SP), ${updated} đơn cập nhật${skipped?`, ${skipped} đơn bỏ qua (ngoài quyền)`:""}.`);
    IMP=null; IMP_WB=null; go("orders");
  }catch(e){ $("#impPreview").innerHTML = btnHtml; fail(e); }
}

async function markPushed(fid){
  const ids = $$(".pk_"+CSS.escape(fid)).filter(c=>c.checked).map(c=>c.value);
  if(!ids.length) return toast("Chưa chọn dòng nào.", true);
  if(!confirm(`Đánh dấu ${ids.length} SP là ĐÃ ĐẨY XƯỞNG (trạng thái → Đã đẩy xưởng, ngày đẩy = hôm nay)?`)) return;
  const { error } = await db.from("order_items").update({ item_status:"ordered", pushed_at: today() }).in("id", ids);

  buildRows(); buildNav(); renderPush(); toast(`Đã đánh dấu ${ids.length} SP.`);
}

async function showSecret(accId){
  const btn = document.getElementById("pw_"+accId);
  const { data, error } = await db.from("factory_secrets").select("password_enc").eq("factory_account_id", accId).maybeSingle();
  if(!btn) return;
  if(error || !data || !data.password_enc){ btn.textContent = "(chưa lưu)"; return; }
  let pw = data.password_enc;
  if(pw.startsWith("b64:")){ try{ pw = decodeURIComponent(escape(atob(pw.slice(4)))); }catch(_){} }
  btn.textContent = pw; btn.onclick = null;
}

async function catSave(id){
  const t = catTab; let row;
  if(t==="factories") row = { name:$("#cf_name").value.trim(), status:$("#cf_status").value,
    production_sla_days:$("#cf_sla1").value?Number($("#cf_sla1").value):null,
    ship_sla_days:$("#cf_sla2").value?Number($("#cf_sla2").value):null,
    website:$("#cf_web").value||null, notes:$("#cf_note").value||null };
  if(t==="templates") row = { code:$("#cf_code").value.trim()||null, name:$("#cf_name").value.trim(),
    product_type:$("#cf_ptype").value||null, factory_id:$("#cf_fact").value||null,
    dimension:$("#cf_dim").value||null, template_link:$("#cf_link").value||null, active:$("#cf_act").value==="1" };
  if(t==="selling_accounts") row = { name:$("#cf_name").value.trim(), platform:$("#cf_plat").value,
    note:$("#cf_note").value||null, active:$("#cf_act").value==="1" };
  if(t==="factory_accounts"){
    row = { factory_id:$("#cf_fact").value||null, email:$("#cf_email").value.trim(),
      note:$("#cf_note").value||null, active:$("#cf_act").value==="1" };
    if(!row.factory_id || !row.email) return toast("Chọn xưởng và nhập email.", true);
  } else if(!row.name) return toast("Nhập tên.", true);
  const q = id ? db.from(t).update(row).eq("id",id).select().single() : db.from(t).insert(row).select().single();
  const { data:saved, error } = await q;
  if(error) return fail(error);
  if(t==="factory_accounts"){
    const pw = $("#cf_pw").value;
    if(pw){
      const enc = "b64:"+btoa(unescape(encodeURIComponent(pw)));
      const { error:e2 } = await db.from("factory_secrets")
        .upsert({ factory_account_id: saved.id, password_enc: enc });
      if(e2) fail(e2);
    }
  }
  closeModal(); toast("Đã lưu.");
  const orderCol = t==="factory_accounts" ? "email" : "name";
  const fresh = await fetchAll(t, {order:orderCol, asc:true}).catch(()=>null);
  if(fresh){ if(t==="factories"){S.factories=fresh; maps.factory=Object.fromEntries(fresh.map(f=>[f.id,f]));}
    if(t==="templates"){S.templates=fresh; maps.template=Object.fromEntries(fresh.map(f=>[f.id,f]));}
    if(t==="selling_accounts"){S.sellAccs=fresh; maps.sellAcc=Object.fromEntries(fresh.map(f=>[f.id,f]));}
    if(t==="factory_accounts"){S.factAccs=fresh;} }
  renderCatalog();
}
async function catDel(id){
  if(!confirm("Xoá mục này? (Nếu đang được đơn hàng dùng sẽ không xoá được)")) return;
  const { error } = await db.from(catTab).delete().eq("id", id);
  if(error) return fail(error);
  closeModal(); toast("Đã xoá.");
  if(catTab==="factories") S.factories = S.factories.filter(x=>x.id!==id);
  if(catTab==="templates") S.templates = S.templates.filter(x=>x.id!==id);
  if(catTab==="selling_accounts") S.sellAccs = S.sellAccs.filter(x=>x.id!==id);
  if(catTab==="factory_accounts") S.factAccs = S.factAccs.filter(x=>x.id!==id);
  renderCatalog();
}

}
function readUserForm(id){
  const k = "u"+id.slice(0,8);
  return { role:$(`#${k}_role`).value, view_scope:$(`#${k}_v`).value, edit_scope:$(`#${k}_e`).value,
    delete_scope:$(`#${k}_d`).value, seller_label:$(`#${k}_label`).value||null };
}
async function approveUser(id){
  const f = readUserForm(id);
  const { error } = await db.from("profiles").update({ ...f, approved:true }).eq("id", id);
  if(error) return fail(error);
  let claimed = 0;
  if(f.seller_label){
    const { data, error:e2 } = await db.rpc("claim_seller_orders", { p_user:id, p_label:f.seller_label });
    if(e2) fail(e2); else claimed = data||0;
  }
  toast(`Đã duyệt.${claimed?` Gán ${claimed} đơn cũ của "${f.seller_label}".`:""}`);
  await reloadData();
}
async function saveUser(id){
  const f = readUserForm(id);
  const p = S.profiles.find(x=>x.id===id);
  const { error } = await db.from("profiles").update(f).eq("id", id);
  if(error) return fail(error);
  let claimed = 0;
  if(f.seller_label && f.seller_label!==p.seller_label){
    const { data } = await db.rpc("claim_seller_orders", { p_user:id, p_label:f.seller_label });
    claimed = data||0;
  }
  Object.assign(p, f);
  toast(`Đã lưu.${claimed?` Gán thêm ${claimed} đơn cũ.`:""}`);
}
async function lockUser(id, active){
  const { error } = await db.from("profiles").update({ active }).eq("id", id);
  if(error) return fail(error);
  S.profiles.find(x=>x.id===id).active = active;
  toast(active?"Đã mở khoá.":"Đã khoá."); renderUsers();
}

/* ================= NHẬT KÝ ================= */
async function renderLog(){
  $("#view").innerHTML = `<h1>Nhật ký hoạt động</h1><p class="sub">Ai INSERT / UPDATE / DELETE gì · ghi tự động ở tầng DB, bất biến</p>
  <div class="card"><div class="flex mb">
    <select id="lgEntity"><option value="">Mọi bảng</option>${["orders","order_items","topups","refunds","payments","templates","factories","profiles"].map(t=>`<option>${t}</option>`).join("")}</select>
    <button class="btn btn-sm" onclick="renderLog()">↻ Tải lại</button></div>
  <div id="lgBody"><p class="muted">Đang tải…</p></div></div>`;
  loadLog();
  $("#lgEntity").onchange = loadLog;
}
async function loadLog(){
  let q = db.from("activity_log").select("*").order("at",{ascending:false}).limit(300);
  const ent = $("#lgEntity") ? $("#lgEntity").value : "";
  if(ent) q = q.eq("entity", ent);
  const { data, error } = await q;
  if(error){ $("#lgBody").innerHTML = `<p class="muted">Không đọc được nhật ký (cần quyền xem-toàn-bộ).</p>`; return; }
  const AV = { INSERT:'<span class="badge b-green">Thêm</span>', UPDATE:'<span class="badge b-yellow">Sửa</span>', DELETE:'<span class="badge b-red">Xoá</span>' };
  $("#lgBody").innerHTML = `<div class="tw" style="max-height:65vh"><table>
  <tr><th>Thời gian</th><th>Người làm</th><th>Hành động</th><th>Bảng</th><th>Chi tiết</th></tr>
  ${(data||[]).map(l=>{
    let detail = "";
    if(l.action==="UPDATE" && l.changes) detail = Object.keys(l.changes).filter(k=>!["updated_at","updated_by"].includes(k)).slice(0,6).join(", ");
    else if(l.changes) detail = (l.changes.platform_order_id || l.changes.name || l.changes.full_name || "");
    return `<tr><td class="nowrap small">${new Date(l.at).toLocaleString("vi-VN")}</td>
    <td>${esc(maps.profile[l.actor]?.full_name||"hệ thống")}</td><td>${AV[l.action]||l.action}</td>
    <td class="small">${l.entity}</td><td class="small muted">${esc(String(detail).slice(0,90))}</td></tr>`;
  }).join("") || `<tr><td colspan="5" class="muted">Chưa có hoạt động nào.</td></tr>`}</table></div>`;
}

/* ================= HỒ SƠ ================= */
function renderProfile(){
  const p = S.me;
  $("#view").innerHTML = `<h1>Hồ sơ</h1><p class="sub">Tài khoản của bạn</p>
  <div class="card" style="max-width:460px">
    <label>Họ tên hiển thị</label><input id="pfName" value="${esc(p.full_name)}" style="width:100%">
    <label>Email</label><input value="${esc(p.email||S.user.email||"")}" disabled style="width:100%">
    <div class="flex mt">
      <span class="badge b-blue">${ROLE_VI[p.role]}</span>
      <span class="badge b-gray">Xem: ${SCOPE_VI[p.view_scope]}</span>
      <span class="badge b-gray">Sửa: ${SCOPE_VI[p.edit_scope]}</span>
      <span class="badge b-gray">Xoá: ${SCOPE_VI[p.delete_scope]}</span>
      ${p.seller_label?`<span class="badge b-purple">Seller cũ: ${esc(p.seller_label)}</span>`:""}
    </div>
    <div class="flex mt">
      <button class="btn btn-p" onclick="saveProfile()">💾 Lưu</button>
      <button class="btn" onclick="$('#btnDark').click()">◐ Đổi giao diện sáng/tối</button>
      <button class="btn btn-danger" onclick="logout()">⎋ Đăng xuất</button>
    </div>
  </div>`;
}
async function saveProfile(){
  const name = $("#pfName").value.trim();
  if(!name) return toast("Nhập họ tên.", true);
  const { error } = await db.from("profiles").update({ full_name:name }).eq("id", S.me.id);
  if(error) return fail(error);
  S.me.full_name = name; $("#userChip").textContent = name+" · "+(ROLE_VI[S.me.role]||"");
  toast("Đã lưu hồ sơ.");
}

boot();
